<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum membres · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-mount"></div>

  <main id="contenu"></main>

  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function() {
      await initPage("forum");
      const contenu = document.getElementById("contenu");
      const profil = await monProfil();

      if (!profil) {
        contenu.innerHTML = `
          <div class="verrou">
            <div class="ico">🔒</div>
            <h2 style="color:var(--bleu-fonce)">Espace réservé aux membres</h2>
            <p style="margin:0.6rem 0 1.2rem;color:var(--gris)">Le forum est accessible uniquement aux membres connectés.</p>
            <a href="connexion.html" class="btn btn-primaire">Se connecter</a>
            <a href="inscription.html" class="btn btn-clair">Adhérer</a>
          </div>`;
        return;
      }
      await dessiner();

      async function dessiner() {
        const { data: messages } = await sb.from("forum_messages")
          .select("*").order("cree_le", { ascending: false });
        const liste = (messages || []).map(m => `
          <div class="msg-forum">
            <div class="meta"><strong>${echapper(m.auteur_nom)}</strong> · ${new Date(m.cree_le).toLocaleString("fr-FR")}</div>
            <div>${echapper(m.texte)}</div>
          </div>`).join("") || "<p style='color:var(--gris)'>Aucun message pour le moment. Lancez la discussion !</p>";

        contenu.innerHTML = `
          <h2 class="section-titre">Forum des membres</h2>
          <p style="color:var(--gris);margin-bottom:1.4rem">Ia ora na ${echapper(profil.nom)} 🌺 — partagez vos situations et entraidez-vous.</p>
          <div class="form-wrap" style="max-width:100%;margin-bottom:2rem">
            <form id="form-msg">
              <div class="champ">
                <label for="texte">Votre message</label>
                <textarea id="texte" rows="3" required placeholder="Décrivez votre situation, posez une question…"></textarea>
              </div>
              <button type="submit" class="btn btn-vert">Publier</button>
            </form>
          </div>
          <div id="liste-msg">${liste}</div>`;

        document.getElementById("form-msg").addEventListener("submit", async function(e) {
          e.preventDefault();
          const texte = document.getElementById("texte").value.trim();
          if (!texte) return;
          const s = await sessionActive();
          await sb.from("forum_messages").insert({ auteur: s.user.id, auteur_nom: profil.nom, texte });
          await dessiner();
        });
      }
    })();
  </script>
</body>
</html>
