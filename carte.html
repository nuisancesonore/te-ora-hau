<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des nuisances · Te Ora Hau</title>
  <meta name="description" content="La carte collective des nuisances sonores signalées en Polynésie française par les adhérents de Te Ora Hau, avec statistiques par commune.">
  <meta property="og:title" content="Carte des nuisances sonores — Te Ora Hau">
  <meta property="og:description" content="Visualisez les zones de nuisances sonores signalées à Tahiti et dans les îles.">
  <meta property="og:image" content="https://nuisancesonore.github.io/te-ora-hau/images/icon-512.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://alaesbkvfprgpngrowbt.supabase.co" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>#map{ height:480px; border-radius:12px; box-shadow:var(--ombre); }
    .legende{ display:flex; gap:1rem; flex-wrap:wrap; margin:1rem 0; font-size:0.85rem; color:var(--gris); }
    .legende span{ display:inline-flex; align-items:center; gap:0.35rem; }
    .dot{ width:14px; height:14px; border-radius:50%; display:inline-block; }
    .stats-wrap{ display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-top:0.8rem; }
    @media(max-width:680px){ .stats-wrap{ grid-template-columns:1fr; } }
    .stat-card{ background:#fff; border-radius:12px; box-shadow:var(--ombre); padding:1rem 1.2rem; }
    .stat-card h3{ color:var(--bleu-fonce); font-size:1.05rem; margin-bottom:0.6rem; }
    .stat-list{ max-height:230px; overflow-y:auto; padding-right:0.3rem; }
    .stat-row{ display:flex; align-items:center; gap:0.7rem; padding:0.4rem 0; border-bottom:1px solid #f0f0ea; font-size:0.9rem; }
    .stat-row:last-child{ border-bottom:none; }
    .stat-row .lib{ flex:0 0 38%; }
    .stat-row .bar{ flex:1; height:7px; background:#eee; border-radius:4px; overflow:hidden; }
    .stat-row .bar>span{ display:block; height:100%; background:var(--bleu-lagon); border-radius:4px; }
    .stat-row .n{ flex:0 0 auto; font-weight:700; color:var(--bleu-fonce); min-width:64px; text-align:right; }
    .stat-row .n small{ color:var(--gris); font-weight:500; }
    .stat-total{ color:var(--gris); font-size:0.85rem; margin:0.2rem 0 0.6rem; }
    .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.9rem; margin:0.6rem 0 1.2rem; }
    .kpi{ background:#fff; border-radius:12px; box-shadow:var(--ombre); padding:1rem; text-align:center; }
    .kpi .n{ font-size:1.8rem; font-weight:800; color:var(--bleu-fonce); line-height:1.1; }
    .kpi .l{ font-size:0.8rem; color:var(--gris); margin-top:0.3rem; }
    .filtre-bar{ display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; margin:0.4rem 0 0.8rem; }
    .filtre-bar label{ font-weight:600; color:var(--bleu-fonce); }
    .filtre-bar select{ padding:0.5rem 0.7rem; border:1.5px solid #d6d6cf; border-radius:9px; font-size:0.95rem; min-width:200px; }
    .modal-profil{ display:none; position:fixed; inset:0; background:rgba(6,74,84,0.55); z-index:2000; align-items:center; justify-content:center; padding:1rem; }
    .modal-profil.ouvert{ display:flex; }
    .mp-box{ background:#fff; border-radius:16px; max-width:420px; width:100%; padding:1.6rem 1.6rem 1.3rem; box-shadow:var(--ombre); position:relative; }
    .mp-x{ position:absolute; top:0.5rem; right:0.8rem; border:none; background:none; font-size:1.7rem; line-height:1; cursor:pointer; color:var(--gris); }
    .mp-box h3{ color:var(--bleu-fonce); margin:0 0 0.15rem; }
    .mp-tag{ font-size:0.82rem; color:var(--gris); margin-bottom:1rem; }
    table.mp{ width:100%; border-collapse:collapse; font-size:0.92rem; }
    table.mp td{ padding:0.45rem 0; border-bottom:1px solid #f0f0ea; vertical-align:top; }
    table.mp td.k{ color:var(--gris); white-space:nowrap; padding-right:0.8rem; width:40%; }
    table.mp tr:last-child td{ border-bottom:none; }</style>
</head>
<body>
  <div id="nav-mount"></div>
  <main>
    <h2 class="section-titre">Carte des nuisances signalées</h2>
    <p style="color:var(--gris);margin-bottom:1rem">Chaque point correspond à un signalement de membre. <a href="signaler.html">Signaler une nuisance →</a></p>
    <div id="etat" style="margin-bottom:1rem"></div>
    <div id="map"></div>
    <div class="legende">
      <strong style="color:var(--bleu-fonce)">Intensité&nbsp;:</strong>
      <span><span class="dot" style="background:#e8b84b"></span> Faible</span>
      <span><span class="dot" style="background:#ff7a59"></span> Moyenne / Forte</span>
      <span><span class="dot" style="background:#b2381f"></span> Insupportable</span>
    </div>
    <div class="legende">
      <strong style="color:var(--bleu-fonce)">Démarche (contour)&nbsp;:</strong>
      <span><span class="dot" style="background:#bbb;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span> Signalement seul</span>
      <span><span class="dot" style="background:#bbb;border:3px solid #0a7d8c"></span> Constat d'autorité</span>
      <span><span class="dot" style="background:#bbb;border:4px solid #064a54"></span> Constat + plainte</span>
    </div>

    <div id="stats"></div>
  </main>

  <!-- Fiche profil de l'auteur (bureau uniquement) -->
  <div id="modal-profil" class="modal-profil" onclick="if(event.target===this)fermerProfil()">
    <div class="mp-box">
      <button class="mp-x" onclick="fermerProfil()" aria-label="Fermer">&times;</button>
      <div id="modal-profil-corps"></div>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function(){
      await initPage("carte");
      const etat = document.getElementById("etat");
      const profil = await monProfil();

      // Carte publique : on lit la vue "signalements_publics" (sans données
      // personnelles — l'adresse du plaignant n'y figure pas). Repli sur la
      // table pour les membres connectés si la vue n'est pas encore déployée.
      // Le bureau voit l'identité des auteurs (suivi des dossiers) ; les autres
      // lisent la vue publique, sans aucune donnée personnelle.
      const estBureau = !!(profil && profil.role === "bureau");
      const COLS = "id,type,commune,quartier,intensite,horaire,recurrence,constat,debut,adresse_source,description,lat,lng";
      let data, error;
      if (estBureau) {
        ({ data, error } = await sb.from("signalements").select("*"));
      } else {
        ({ data, error } = await sb.from("signalements_publics").select(COLS));
        if (error && profil) ({ data, error } = await sb.from("signalements").select("*"));
      }
      if (error){
        etat.innerHTML = `<div class="message ${profil?'err':'ok'}" style="display:block">${
          profil ? "Erreur : " + echapper(error.message)
                 : "La carte publique sera bientôt disponible. En attendant, <a href=\"connexion.html\">connectez-vous</a> pour consulter les signalements."
        }</div>`;
        data = [];
      }

      // Profils des auteurs (bureau uniquement) — pour afficher l'identité au clic.
      const profilsParId = {};
      if (estBureau) {
        const { data: ps } = await sb.from("profils")
          .select("id, nom, prenom, email, telephone, date_naissance, commune, adresse, type_nuisance, type_adhesion, cotisation_payee, cotisation_echeance");
        (ps || []).forEach(p => { profilsParId[p.id] = p; });
        window.TOH_PROFILS = profilsParId;
      }

      const plein = aDroitAcces(profil);

      // La carte est toujours affichée avec les points (couleur = intensité).
      const map = L.map("map").setView([-17.62, -149.46], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);
      const geoloc = data.filter(s => s.lat != null && s.lng != null);
      const couleur = i => i==="Insupportable" ? "#b2381f" : i==="Faible" ? "#e8b84b" : "#ff7a59";
      // Contour = niveau de démarche (réservé aux adhérents validés).
      const bord = c => c==="Constat + plainte" ? {color:"#064a54", weight:4}
                       : c==="Constat d'autorité" ? {color:"#0a7d8c", weight:3}
                       : {color:"#ffffff", weight:2};
      const moisAn = moisAnnee; // formateur "AAAA-MM" -> "mois AAAA" (js/app.js)
      geoloc.forEach(s => {
        const b = plein ? bord(s.constat) : { color:"#ffffff", weight:2 };
        const m = L.circleMarker([s.lat, s.lng], {
          radius:9, color:b.color, weight:b.weight, fillColor:couleur(s.intensite), fillOpacity:0.9,
        }).addTo(map);
        // Détail complet (cause, démarche, adresse) réservé aux adhérents validés.
        if (plein) {
          let html =
            `<strong>${echapper(s.type)}</strong><br>`+
            `${echapper(s.commune)||''}${s.quartier?' — '+echapper(s.quartier):''} · ${echapper(s.horaire)||''}${s.horaire_detail?` (${echapper(s.horaire_detail)})`:''}<br>`+
            `Intensité : ${echapper(s.intensite)} · ${echapper(s.recurrence)||''}`+
            (s.debut?`<br>Depuis ${moisAn(s.debut)}`:"")+
            (s.voisins_genes?`<br>Voisins également gênés`:"")+
            (s.preuves?`<br>Preuves : ${echapper(s.preuves)}`:"")+
            `<br><strong>${echapper(s.constat||"Signalement seul")}</strong>`+
            (s.adresse_source?`<br>📍 ${echapper(s.adresse_source)}`:"")+
            (s.description?`<br><em>${echapper(s.description)}</em>`:"");
          // Identité de l'auteur — réservée au bureau.
          if (estBureau && s.auteur && profilsParId[s.auteur]) {
            const a = profilsParId[s.auteur];
            const age = ageProfil(a.date_naissance);
            html += `<div style="margin-top:0.5rem;padding-top:0.4rem;border-top:1px solid #e6e6e6">`+
              `<div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;color:#999">Signalé par</div>`+
              `<div style="font-weight:600">${echapper(nomComplet(a))||'—'}${age!=null?` · ${age} ans`:''}</div>`+
              (a.telephone||a.email ? `<div style="font-size:0.85rem">${a.telephone?echapper(a.telephone):''}${a.telephone&&a.email?' · ':''}${echapper(a.email)||''}</div>` : "")+
              `<a href="#" onclick="voirProfil('${s.auteur}');return false;" style="font-weight:600">Voir le profil →</a>`+
              `</div>`;
          }
          m.bindPopup(html);
        }
        // Visiteur : juste le point, sans détail de la cause.
      });

      // La légende "démarche (contour)" n'est visible que pour les adhérents validés.
      if (!plein) {
        const legendes = document.querySelectorAll(".legende");
        if (legendes[1]) legendes[1].style.display = "none";   // 2e légende = démarche
      }

      // Message d'état
      if (!geoloc.length) {
        etat.innerHTML = `<div class="message ok" style="display:block">Aucun signalement géolocalisé pour le moment.${plein ? ' Soyez le premier : <a href="signaler.html">signaler</a>.' : ''}</div>`;
      } else if (!plein) {
        etat.innerHTML = `<div class="message ok" style="display:block">${
          profil
            ? "Votre adhésion est <strong>en attente de validation</strong>. Les points montrent les zones et l'intensité ; le <strong>détail</strong> (cause, démarche, adresse) et la possibilité de <strong>signaler</strong> seront débloqués après validation. <a href=\"cotiser.html\">Régler ma cotisation</a>"
            : "Carte publique : les points montrent les <strong>zones</strong> et l'<strong>intensité</strong> des nuisances signalées. Pour le <strong>détail</strong> et pour <strong>signaler</strong> vous-même, <a href=\"connexion.html\">connectez-vous</a> et adhérez à Te Ora Hau."
        }</div>`;
      }

      // ----- Statistiques (filtrables par commune) -----
      const communesDispo = [...new Set(data.map(s => (s.commune||"").trim()).filter(Boolean))].sort();

      function compter(arr, champ){
        const m = {};
        arr.forEach(s => { const k = (s[champ]||"").trim() || "Non précisé"; m[k] = (m[k]||0)+1; });
        return Object.entries(m).sort((a,b) => b[1]-a[1]);
      }
      function tableau(titre, lignes, totalF, scroll){
        const max = lignes.length ? lignes[0][1] : 1;
        const p = n => totalF ? Math.round(n/totalF*100) : 0;
        const rows = lignes.length ? lignes.map(([k,n]) =>
          `<div class="stat-row">
             <span class="lib">${echapper(k)}</span>
             <span class="bar"><span style="width:${Math.round(n/max*100)}%"></span></span>
             <span class="n">${n} <small>(${p(n)}%)</small></span>
           </div>`).join("")
          : `<div class="stat-row"><span class="lib" style="color:var(--gris)">Aucune donnée</span></div>`;
        return `<div class="stat-card"><h3>${titre}</h3><div class="${scroll?'stat-list':''}">${rows}</div></div>`;
      }

      function rendreStats(filtre){
        const sous = filtre ? data.filter(s => (s.commune||"").trim() === filtre) : data;
        const n = sous.length;
        const p = x => n ? Math.round(x/n*100) : 0;
        const geo = sous.filter(s => s.lat != null).length;
        const fortes = sous.filter(s => s.intensite==="Forte" || s.intensite==="Insupportable").length;
        const constat = sous.filter(s => s.constat==="Constat d'autorité" || s.constat==="Constat + plainte").length;
        const k4 = filtre
          ? `<div class="kpi"><div class="n" style="font-size:1.15rem">${echapper(filtre)}</div><div class="l">Commune sélectionnée</div></div>`
          : (()=>{ const pc = compter(data,"commune"); const t = pc[0]?`${pc[0][0]} (${pc[0][1]})`:"—";
                   return `<div class="kpi"><div class="n" style="font-size:1.15rem">${echapper(t)}</div><div class="l">Commune la plus touchée</div></div>`; })();

        // KPI "appuyés par un constat" : adhérents validés uniquement.
        const kpiConstat = plein ? `<div class="kpi"><div class="n">${p(constat)}%</div><div class="l">Appuyés par un constat</div></div>` : ``;
        // Détail par quartier : seulement pour les adhérents validés, commune filtrée.
        const premierTableau = (plein && filtre)
          ? tableau("Par quartier / localité", compter(sous,"quartier"), n, true)
          : tableau("Par commune", compter(sous,"commune"), n, true);
        // "Par démarche" et "Par intensité" : adhérents validés uniquement.
        const tablesAvancees = plein
          ? `${tableau("Par démarche", compter(sous,"constat"), n)}${tableau("Par intensité", compter(sous,"intensite"), n)}`
          : ``;

        document.getElementById("stats-corps").innerHTML =
          `<div class="kpis">
             <div class="kpi"><div class="n">${n}</div><div class="l">Signalements</div></div>
             <div class="kpi"><div class="n">${p(fortes)}%</div><div class="l">Forts ou insupportables</div></div>
             ${kpiConstat}
             ${k4}
           </div>
           <div class="stat-total">${geo} géolocalisé(s) sur ${n}${filtre?` (commune : ${echapper(filtre)})`:""}.</div>
           <div class="stats-wrap">
             ${premierTableau}
             ${tableau("Par objet (type)", compter(sous,"type"), n, true)}
             ${tablesAvancees}
           </div>`;
      }

      document.getElementById("stats").innerHTML =
        `<div class="filtre-bar">
           <label for="sel-commune-stats">Filtrer par commune&nbsp;:</label>
           <select id="sel-commune-stats">
             <option value="">Toutes les communes</option>
             ${communesDispo.map(c => `<option>${echapper(c)}</option>`).join("")}
           </select>
         </div>
         <div id="stats-corps"></div>`;
      document.getElementById("sel-commune-stats").addEventListener("change", e => rendreStats(e.target.value));
      rendreStats("");
    })();

    /* ----- Fiche profil de l'auteur (bureau) ----- */
    function ageProfil(d){
      if (!d) return null; const x = new Date(d); if (isNaN(x)) return null;
      const t = new Date(); let a = t.getFullYear()-x.getFullYear();
      const m = t.getMonth()-x.getMonth();
      if (m<0 || (m===0 && t.getDate()<x.getDate())) a--;
      return a;
    }
    function voirProfil(id){
      const p = (window.TOH_PROFILS||{})[id];
      if (!p) return;
      const age = ageProfil(p.date_naissance);
      const aJour = p.cotisation_payee && (!p.cotisation_echeance || new Date(p.cotisation_echeance) >= new Date());
      const ech = p.cotisation_echeance ? new Date(p.cotisation_echeance).toLocaleDateString('fr-FR') : '—';
      const tel = (p.telephone||'').trim();
      const lig = (k,v) => `<tr><td class="k">${k}</td><td>${v}</td></tr>`;
      document.getElementById("modal-profil-corps").innerHTML =
        `<h3>${echapper(nomComplet(p))||'Adhérent'}</h3>`+
        `<div class="mp-tag">${echapper(p.type_adhesion)||'Adhérent'} · ${aJour?'cotisation à jour':'cotisation à régler'}</div>`+
        `<table class="mp">`+
          lig('Âge', age!=null ? age+' ans' : '—')+
          lig('Téléphone', tel ? `<a href="tel:${encodeURIComponent(tel)}">${echapper(tel)}</a>` : '—')+
          lig('E-mail', p.email ? `<a href="mailto:${encodeURIComponent(p.email)}">${echapper(p.email)}</a>` : '—')+
          lig('Commune', echapper(p.commune)||'—')+
          lig('Adresse', echapper(p.adresse)||'—')+
          lig('Nuisance subie', echapper(p.type_nuisance)||'—')+
          lig('Échéance cotisation', ech)+
        `</table>`;
      document.getElementById("modal-profil").classList.add("ouvert");
    }
    function fermerProfil(){ document.getElementById("modal-profil").classList.remove("ouvert"); }
    document.addEventListener("keydown", e => { if (e.key === "Escape") fermerProfil(); });
  </script>
</body>
</html>
