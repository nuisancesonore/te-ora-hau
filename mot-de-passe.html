<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-mount"></div>

  <main>
    <div class="form-wrap">
      <h2>Mot de passe oublié</h2>
      <p class="intro">Indiquez votre e-mail : un lien de réinitialisation vous sera envoyé.</p>
      <div id="msg" class="message"></div>
      <form id="form-mdp">
        <div class="champ">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" required placeholder="vous@exemple.pf">
        </div>
        <button type="submit" class="btn btn-primaire btn-bloc">Réinitialiser</button>
      </form>
      <p class="form-foot"><a href="connexion.html">Retour à la connexion</a></p>
    </div>
  </main>

  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    initPage("");
    const msg = document.getElementById("msg");
    document.getElementById("form-mdp").addEventListener("submit", async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (TOH_PRET) await reinitMotDePasse(email);
      msg.className = "message ok";
      msg.textContent = "Si un compte est associé à cet e-mail, un lien de réinitialisation vient d'être envoyé.";
    });
  </script>
</body>
</html>
