<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des nuisances · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>#map{ height:480px; border-radius:12px; box-shadow:var(--ombre); }
    .legende{ display:flex; gap:1rem; flex-wrap:wrap; margin:1rem 0; font-size:0.85rem; color:var(--gris); }
    .legende span{ display:inline-flex; align-items:center; gap:0.35rem; }
    .dot{ width:14px; height:14px; border-radius:50%; display:inline-block; }
    .stats-wrap{ display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-top:0.8rem; }
    @media(max-width:680px){ .stats-wrap{ grid-template-columns:1fr; } }
    .stat-card{ background:#fff; border-radius:12px; box-shadow:var(--ombre); padding:1rem 1.2rem; }
    .stat-card h3{ color:var(--bleu-fonce); font-size:1.05rem; margin-bottom:0.6rem; }
    .stat-list{ max-height:230px; overflow-y:auto; padding-right:0.3rem; }
    .stat-row{ display:flex; align-items:center; gap:0.7rem; padding:0.4rem 0; border-bottom:1px solid #f0f0ea; font-size:0.9rem; }
    .stat-row:last-child{ border-bottom:none; }
    .stat-row .lib{ flex:0 0 38%; }
    .stat-row .bar{ flex:1; height:7px; background:#eee; border-radius:4px; overflow:hidden; }
    .stat-row .bar>span{ display:block; height:100%; background:var(--bleu-lagon); border-radius:4px; }
    .stat-row .n{ flex:0 0 auto; font-weight:700; color:var(--bleu-fonce); min-width:64px; text-align:right; }
    .stat-row .n small{ color:var(--gris); font-weight:500; }
    .stat-total{ color:var(--gris); font-size:0.85rem; margin:0.2rem 0 0.6rem; }
    .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.9rem; margin:0.6rem 0 1.2rem; }
    .kpi{ background:#fff; border-radius:12px; box-shadow:var(--ombre); padding:1rem; text-align:center; }
    .kpi .n{ font-size:1.8rem; font-weight:800; color:var(--bleu-fonce); line-height:1.1; }
    .kpi .l{ font-size:0.8rem; color:var(--gris); margin-top:0.3rem; }
    .filtre-bar{ display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; margin:0.4rem 0 0.8rem; }
    .filtre-bar label{ font-weight:600; color:var(--bleu-fonce); }
    .filtre-bar select{ padding:0.5rem 0.7rem; border:1.5px solid #d6d6cf; border-radius:9px; font-size:0.95rem; min-width:200px; }</style>
</head>
<body>
  <div id="nav-mount"></div>
  <main>
    <h2 class="section-titre">Carte des nuisances signalées</h2>
    <p style="color:var(--gris);margin-bottom:1rem">Chaque point correspond à un signalement de membre. <a href="signaler.html">Signaler une nuisance →</a></p>
    <div id="etat" style="margin-bottom:1rem"></div>
    <div id="map"></div>
    <div class="legende">
      <strong style="color:var(--bleu-fonce)">Intensité&nbsp;:</strong>
      <span><span class="dot" style="background:#e8b84b"></span> Faible</span>
      <span><span class="dot" style="background:#ff7a59"></span> Moyenne / Forte</span>
      <span><span class="dot" style="background:#b2381f"></span> Insupportable</span>
    </div>
    <div class="legende">
      <strong style="color:var(--bleu-fonce)">Démarche (contour)&nbsp;:</strong>
      <span><span class="dot" style="background:#bbb;border:2px solid #fff;box-shadow:0 0 0 1px #ccc"></span> Signalement seul</span>
      <span><span class="dot" style="background:#bbb;border:3px solid #0a7d8c"></span> Constat d'autorité</span>
      <span><span class="dot" style="background:#bbb;border:4px solid #064a54"></span> Constat + plainte</span>
    </div>

    <div id="stats"></div>
  </main>
  <div id="footer-mount"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function(){
      await initPage("carte");
      const map = L.map("map").setView([-17.62, -149.46], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);

      const etat = document.getElementById("etat");
      const profil = await monProfil();
      if (!profil){
        etat.innerHTML = `<div class="message err" style="display:block">Connectez-vous pour voir les signalements des membres. <a href="connexion.html">Se connecter</a></div>`;
        return;
      }
      const { data, error } = await sb.from("signalements").select("*");
      if (error){ etat.innerHTML = `<div class="message err" style="display:block">Erreur : ${error.message}</div>`; return; }

      const geoloc = data.filter(s => s.lat != null && s.lng != null);
      if (!geoloc.length){ etat.innerHTML = `<div class="message ok" style="display:block">Aucun signalement géolocalisé pour le moment. Soyez le premier : <a href="signaler.html">signaler</a>.</div>`; }

      const couleur = i => i==="Insupportable" ? "#b2381f" : i==="Faible" ? "#e8b84b" : "#ff7a59";
      // Le contour (bord) du point indique le niveau de démarche (constat).
      const bord = c => c==="Constat + plainte" ? {color:"#064a54", weight:4}
                       : c==="Constat d'autorité" ? {color:"#0a7d8c", weight:3}
                       : {color:"#ffffff", weight:2};
      const moisAn = moisAnnee; // formateur "AAAA-MM" -> "mois AAAA" (js/app.js)
      geoloc.forEach(s => {
        const b = bord(s.constat);
        L.circleMarker([s.lat, s.lng], {
          radius:9, color:b.color, weight:b.weight, fillColor:couleur(s.intensite), fillOpacity:0.9,
        }).addTo(map).bindPopup(
          `<strong>${echapper(s.type)}</strong><br>`+
          `${echapper(s.commune)||''}${s.quartier?' — '+echapper(s.quartier):''} · ${echapper(s.horaire)||''}<br>`+
          `Intensité : ${echapper(s.intensite)} · ${echapper(s.recurrence)||''}`+
          (s.debut?`<br>Depuis ${moisAn(s.debut)}`:"")+
          `<br><strong>${echapper(s.constat||"Signalement seul")}</strong>`+
          (s.adresse_source?`<br>📍 ${echapper(s.adresse_source)}`:"")+
          (s.description?`<br><em>${echapper(s.description)}</em>`:"")
        );
      });

      // ----- Statistiques (filtrables par commune) -----
      const communesDispo = [...new Set(data.map(s => (s.commune||"").trim()).filter(Boolean))].sort();

      function compter(arr, champ){
        const m = {};
        arr.forEach(s => { const k = (s[champ]||"").trim() || "Non précisé"; m[k] = (m[k]||0)+1; });
        return Object.entries(m).sort((a,b) => b[1]-a[1]);
      }
      function tableau(titre, lignes, totalF, scroll){
        const max = lignes.length ? lignes[0][1] : 1;
        const p = n => totalF ? Math.round(n/totalF*100) : 0;
        const rows = lignes.length ? lignes.map(([k,n]) =>
          `<div class="stat-row">
             <span class="lib">${echapper(k)}</span>
             <span class="bar"><span style="width:${Math.round(n/max*100)}%"></span></span>
             <span class="n">${n} <small>(${p(n)}%)</small></span>
           </div>`).join("")
          : `<div class="stat-row"><span class="lib" style="color:var(--gris)">Aucune donnée</span></div>`;
        return `<div class="stat-card"><h3>${titre}</h3><div class="${scroll?'stat-list':''}">${rows}</div></div>`;
      }

      function rendreStats(filtre){
        const sous = filtre ? data.filter(s => (s.commune||"").trim() === filtre) : data;
        const n = sous.length;
        const p = x => n ? Math.round(x/n*100) : 0;
        const geo = sous.filter(s => s.lat != null).length;
        const fortes = sous.filter(s => s.intensite==="Forte" || s.intensite==="Insupportable").length;
        const constat = sous.filter(s => s.constat==="Constat d'autorité" || s.constat==="Constat + plainte").length;
        const k4 = filtre
          ? `<div class="kpi"><div class="n" style="font-size:1.15rem">${echapper(filtre)}</div><div class="l">Commune sélectionnée</div></div>`
          : (()=>{ const pc = compter(data,"commune"); const t = pc[0]?`${pc[0][0]} (${pc[0][1]})`:"—";
                   return `<div class="kpi"><div class="n" style="font-size:1.15rem">${echapper(t)}</div><div class="l">Commune la plus touchée</div></div>`; })();
        // Quand une commune est filtrée, on détaille par quartier au lieu de "par commune"
        const premierTableau = filtre
          ? tableau("Par quartier / localité", compter(sous,"quartier"), n, true)
          : tableau("Par commune", compter(sous,"commune"), n, true);

        document.getElementById("stats-corps").innerHTML =
          `<div class="kpis">
             <div class="kpi"><div class="n">${n}</div><div class="l">Signalements</div></div>
             <div class="kpi"><div class="n">${p(fortes)}%</div><div class="l">Forts ou insupportables</div></div>
             <div class="kpi"><div class="n">${p(constat)}%</div><div class="l">Appuyés par un constat</div></div>
             ${k4}
           </div>
           <div class="stat-total">${geo} géolocalisé(s) sur ${n}${filtre?` (commune : ${echapper(filtre)})`:""}.</div>
           <div class="stats-wrap">
             ${premierTableau}
             ${tableau("Par objet (type)", compter(sous,"type"), n, true)}
             ${tableau("Par démarche", compter(sous,"constat"), n)}
             ${tableau("Par intensité", compter(sous,"intensite"), n)}
           </div>`;
      }

      document.getElementById("stats").innerHTML =
        `<div class="filtre-bar">
           <label for="sel-commune-stats">Filtrer par commune&nbsp;:</label>
           <select id="sel-commune-stats">
             <option value="">Toutes les communes</option>
             ${communesDispo.map(c => `<option>${echapper(c)}</option>`).join("")}
           </select>
         </div>
         <div id="stats-corps"></div>`;
      document.getElementById("sel-commune-stats").addEventListener("change", e => rendreStats(e.target.value));
      rendreStats("");
    })();
  </script>
</body>
</html>
