<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-mount"></div>

  <main>
    <div class="form-wrap">
      <h2>Nous contacter</h2>
      <p class="intro">Une question ? Écrivez-nous, nous vous répondrons rapidement.</p>
      <p style="color:var(--gris);font-size:0.9rem;margin:-0.8rem 0 1.2rem">
        Directement&nbsp;: <a href="mailto:contact@teorahau.net">contact@teorahau.net</a> ·
        <a href="tel:+68987721687">87 72 16 87</a>
      </p>
      <div id="msg" class="message"></div>
      <form id="form-contact">
        <div class="champ">
          <label for="nom">Nom</label>
          <input type="text" id="nom" required>
        </div>
        <div class="champ">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" required>
        </div>
        <div class="champ">
          <label for="commune">Commune</label>
          <select id="commune" required></select>
          <input id="commune_autre" placeholder="Précisez la commune" style="display:none;margin-top:0.5rem">
        </div>
        <div class="champ">
          <label for="email">E-mail</label>
          <input type="email" id="email" required>
        </div>
        <div class="champ">
          <label for="sujet">Sujet</label>
          <input type="text" id="sujet" required>
        </div>
        <div class="champ">
          <label for="message">Message</label>
          <textarea id="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primaire btn-bloc">Envoyer</button>
      </form>
    </div>
  </main>

  <div id="footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    initPage("contact");
    document.getElementById("commune").innerHTML = optionsCommunes("");
    const valCommune = brancherCommuneAutre(document.getElementById("commune"), document.getElementById("commune_autre"));
    const msg = document.getElementById("msg");
    const champ = id => (document.getElementById(id).value || "").trim();
    document.getElementById("form-contact").addEventListener("submit", async function(e) {
      e.preventDefault();
      const row = {
        nom: champ("nom"), prenom: champ("prenom"), commune: valCommune(),
        email: champ("email"), sujet: champ("sujet"), message: champ("message"),
      };
      let envoye = false;
      try { const { error } = await sb.from("messages_contact").insert(row); envoye = !error; }
      catch (_) { envoye = false; }

      if (envoye) {
        msg.className = "message ok";
        msg.textContent = "Merci, votre message a bien été transmis au bureau. Nous vous répondrons rapidement.";
        e.target.reset();
        document.getElementById("commune").innerHTML = optionsCommunes("");
      } else {
        // Repli : ouverture du courriel pré-rempli (table non déployée / hors-ligne).
        const corps = `Nom : ${row.prenom} ${row.nom}\nCommune : ${row.commune}\nE-mail : ${row.email}\n\n${row.message}`;
        window.location.href = `mailto:contact@teorahau.net` +
          `?subject=${encodeURIComponent("[Site] " + row.sujet)}&body=${encodeURIComponent(corps)}`;
        msg.className = "message ok";
        msg.textContent = "Votre logiciel de messagerie va s'ouvrir avec le message pré-rempli. S'il ne s'ouvre pas, écrivez à contact@teorahau.net.";
      }
    });
  </script>
</body>
</html>
