<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:1.6rem; }
    .stat { background:var(--blanc); border-radius:var(--radius); padding:1.1rem; box-shadow:var(--ombre); text-align:center; border-top:4px solid var(--vert-paix); }
    .stat .n { font-size:2rem; font-weight:800; color:var(--bleu-fonce); }
    .stat .l { font-size:0.82rem; color:var(--gris); }
    .barre { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:1rem; align-items:center; }
    .barre input, .barre select { padding:0.5rem 0.7rem; border:1.5px solid #d6d6cf; border-radius:8px; }
    table.adh { width:100%; border-collapse:collapse; background:var(--blanc); box-shadow:var(--ombre); border-radius:10px; overflow:hidden; }
    table.adh th, table.adh td { padding:0.65rem 0.8rem; text-align:left; border-bottom:1px solid #eee; font-size:0.9rem; }
    table.adh th { background:var(--bleu-fonce); color:#fff; }
    .pill { padding:0.15rem 0.6rem; border-radius:12px; font-size:0.78rem; font-weight:700; }
    .pill.ok{ background:#e3f5ea; color:#1d6b3f; } .pill.ko{ background:#fce6e1; color:#b2381f; }
    .mini { padding:0.3rem 0.6rem; font-size:0.8rem; border-radius:7px; border:none; cursor:pointer; }
    .mini.vert{ background:var(--vert-paix); color:#fff; } .mini.clair{ background:#eee; }
    .act { display:flex; flex-wrap:wrap; gap:0.35rem; align-items:center; }
    .act .ech { padding:0.25rem 0.4rem; border:1.5px solid #d6d6cf; border-radius:6px; font-size:0.8rem; }
    .act label { font-size:0.78rem; color:var(--gris); display:inline-flex; align-items:center; gap:0.2rem; cursor:pointer; }
    .msg-c { background:#fff; border-radius:10px; box-shadow:var(--ombre); padding:0.9rem 1.1rem; margin-bottom:0.8rem; border-left:4px solid var(--corail); font-size:0.9rem; }
    .msg-c.lu { border-left-color:#bbb; opacity:0.7; }
    .msg-c .meta { font-size:0.8rem; color:var(--gris); margin-bottom:0.2rem; }
    .msg-c a.mini { text-decoration:none; display:inline-block; }
    .dcards { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1rem; }
    .dcard { background:#fff; border-radius:12px; box-shadow:var(--ombre); padding:1rem 1.2rem; }
    .dcard h3 { color:var(--bleu-fonce); font-size:1rem; margin-bottom:0.6rem; }
    .drow { display:flex; align-items:center; gap:0.6rem; padding:0.3rem 0; font-size:0.88rem; }
    .drow .lib { flex:0 0 42%; }
    .drow .bar { flex:1; height:7px; background:#eee; border-radius:4px; overflow:hidden; }
    .drow .bar>span { display:block; height:100%; background:var(--bleu-lagon); border-radius:4px; }
    .drow .n { flex:0 0 auto; font-weight:700; color:var(--bleu-fonce); min-width:54px; text-align:right; }
    details.acc { background:#fff; border-radius:12px; box-shadow:var(--ombre); margin-bottom:0.9rem; overflow:hidden; }
    details.acc > summary { cursor:pointer; padding:1rem 1.3rem; font-weight:700; color:var(--bleu-fonce); list-style:none; display:flex; align-items:center; gap:0.7rem; font-size:1.05rem; }
    details.acc > summary::-webkit-details-marker { display:none; }
    details.acc > summary .t { flex:1; }
    details.acc > summary::after { content:"▸"; color:var(--corail); font-weight:700; transition:transform 0.15s; }
    details.acc[open] > summary::after { transform:rotate(90deg); }
    details.acc > .corps { padding:0 1.3rem 1.3rem; }
    .badge-n { background:var(--bleu-lagon); color:#fff; border-radius:20px; font-size:0.75rem; font-weight:700; padding:0.12rem 0.6rem; }
    .badge-n:empty { display:none; }
    .com-etape { font-weight:800; color:var(--bleu-fonce); margin:1.2rem 0 0.2rem; padding-top:1rem; border-top:1px solid #eee; font-size:0.95rem; }
    .com-etape.premiere { margin-top:0; padding-top:0; border-top:none; }
    .com-hint { font-size:0.8rem; color:var(--gris); margin:0 0 0.6rem; }
    details.com-plus { margin-top:0.6rem; }
    details.com-plus summary { cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--bleu-lagon); list-style:none; }
    details.com-plus summary::-webkit-details-marker { display:none; }
    details.com-plus .corps { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.6rem; }
    #tableau { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table.adh { min-width:720px; }
    .tableau-wrap { position:relative; }
    .hint-scroll { font-size:0.82rem; color:var(--gris); margin:0 0 0.45rem; display:flex; align-items:center; gap:0.35rem; }
    .hint-scroll .fl { color:var(--corail); font-weight:800; }
    .tableau-wrap::after {
      content:""; position:absolute; top:0; right:0; bottom:0; width:30px; pointer-events:none;
      background:linear-gradient(to left, rgba(6,74,84,0.16), rgba(6,74,84,0)); border-radius:0 10px 10px 0;
    }
    @media (min-width:820px){ .hint-scroll, .tableau-wrap::after { display:none; } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <main id="contenu"><p style="color:var(--gris)">Chargement…</p></main>
  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    let ADH = [];
    let MOI = null;
    let ANNONCES = [];
    let EDIT_ID = null;
    (async function() {
      await initPage("admin");
      const contenu = document.getElementById("contenu");
      const profil = await monProfil();
      MOI = profil;
      if (!profil || profil.role !== "bureau") {
        contenu.innerHTML = `<div class="verrou"><div class="ico">⛔</div>
          <h2 style="color:var(--bleu-fonce)">Accès réservé au bureau</h2>
          <p style="color:var(--gris);margin-top:0.6rem">Cette page est réservée aux administrateurs de l'association.</p></div>`;
        return;
      }

      const { data, error } = await sb.from("profils").select("*").order("cree_le", { ascending:false });
      if (error) { contenu.innerHTML = `<p style="color:#b2381f">Erreur : ${error.message}</p>`; return; }
      ADH = data || [];

      const total = ADH.length;
      const aJour = ADH.filter(estAJour).length;
      const enRetard = total - aJour;
      const communes = new Set(ADH.map(a => a.commune).filter(Boolean)).size;

      contenu.innerHTML = `
        <h2 class="section-titre">Tableau de bord du bureau</h2>
        <div class="stats">
          <div class="stat"><div class="n">${total}</div><div class="l">Adhérents</div></div>
          <div class="stat"><div class="n">${aJour}</div><div class="l">À jour de cotisation</div></div>
          <div class="stat" style="border-top-color:var(--corail)"><div class="n">${enRetard}</div><div class="l">À relancer</div></div>
          <div class="stat" style="border-top-color:var(--bleu-lagon)"><div class="n">${communes}</div><div class="l">Communes</div></div>
        </div>

        <details class="acc" open>
          <summary><span class="t">Adhérents — cotisations &amp; validation</span><span class="badge-n">${total}</span></summary>
          <div class="corps">
            <div class="barre">
              <input id="q" placeholder="Rechercher un nom / e-mail…" style="flex:1;min-width:180px">
              <select id="filtre">
                <option value="">Tous</option>
                <option value="ok">À jour</option>
                <option value="ko">En retard</option>
              </select>
              <button class="btn btn-clair" onclick="exportCSV()">Exporter CSV</button>
            </div>
            <p class="hint-scroll"><span class="fl">↔</span> Faites glisser le tableau pour voir toutes les colonnes</p>
            <div class="tableau-wrap"><div id="tableau"></div></div>
          </div>
        </details>

        <details class="acc">
          <summary><span class="t">Statistiques des adhérents</span></summary>
          <div class="corps"><div id="stats-detail"></div></div>
        </details>

        <details class="acc">
          <summary><span class="t">Démarches des adhérents</span><span class="badge-n" id="cnt-demarches"></span></summary>
          <div class="corps">
            <p style="color:var(--gris);margin:0 0 0.8rem;font-size:0.9rem">Les démarches que les adhérents consignent depuis leurs outils (courrier amiable, mise en demeure, mairie, gendarmerie, plainte…) — pour suivre et appuyer leurs dossiers.</p>
            <div id="demarches-bureau"><p style="color:var(--gris)">Chargement…</p></div>
          </div>
        </details>

        <details class="acc">
          <summary><span class="t">Missions des assesseurs</span><span class="badge-n" id="cnt-missions"></span></summary>
          <div class="corps">
            <p style="color:var(--gris);margin:0 0 0.8rem;font-size:0.9rem">Confiez des missions aux assesseurs (à un assesseur précis, ou ouverte à tous : le premier qui la prend se l'attribue). Ils rendent compte depuis leur page « Mes missions ».</p>
            <div id="missions-admin"><p style="color:var(--gris)">Chargement…</p></div>
          </div>
        </details>

        <details class="acc">
          <summary><span class="t">Communication aux membres</span></summary>
          <div class="corps"><div id="communication"></div></div>
        </details>

        <details class="acc">
          <summary><span class="t">Messages de contact</span><span class="badge-n" id="cnt-messages"></span></summary>
          <div class="corps"><div id="messages"><p style="color:var(--gris)">Chargement…</p></div></div>
        </details>`;

      document.getElementById("q").addEventListener("input", dessiner);
      document.getElementById("filtre").addEventListener("change", dessiner);
      dessiner();
      rendreStatsDetail();
      rendreCommunication();
      chargerMessages();
      chargerDemarchesBureau();
      rendreMissionsAdmin();
    })();

    /* ----- Missions des assesseurs ----- */
    let MISSIONS_ADM = [], MCOMS = {};
    function rendreMissionsAdmin(){
      const assesseurs = ADH.filter(a => a.type_adhesion === "Assesseur");
      document.getElementById("missions-admin").innerHTML = `
        <div class="form-wrap" style="max-width:100%;margin:0 0 1.2rem">
          <div id="mmsg" class="message"></div>
          <div class="champ"><label>Titre de la mission</label>
            <input id="m-titre" placeholder="Ex. Distribuer les flyers à Paea, contacter la mairie de Faa'a…"></div>
          <div class="champ"><label>Détails / consignes (facultatif)</label>
            <textarea id="m-desc" rows="3" placeholder="Précisez le contexte, le lieu, les contacts utiles…"></textarea></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.8rem">
            <div class="champ"><label>Confier à</label>
              <select id="m-qui">
                <option value="">Tous les assesseurs (le premier qui la prend)</option>
                ${assesseurs.map(a => `<option value="${a.id}">${echapper(nomComplet(a) || a.email)}</option>`).join("")}
              </select></div>
            <div class="champ"><label>Échéance (facultatif)</label><input type="date" id="m-ech"></div>
          </div>
          <button class="btn btn-vert" onclick="creerMission()">Confier la mission</button>
          ${assesseurs.length ? "" : `<p style="font-size:0.82rem;color:var(--gris);margin-top:0.5rem">Aucun assesseur inscrit pour l'instant — les missions « ouvertes à tous » les attendront.</p>`}
        </div>
        <div id="missions-liste"><p style="color:var(--gris)">Chargement…</p></div>`;
      chargerMissionsAdmin();
    }
    async function chargerMissionsAdmin(){
      const box = document.getElementById("missions-liste");
      const { data, error } = await sb.from("missions").select("*").order("cree_le", { ascending:false });
      if (error){ box.innerHTML = `<p style="color:var(--gris)">Missions non activées (déployez <strong>migration-missions.sql</strong>).</p>`; return; }
      MISSIONS_ADM = data || [];
      setCnt("cnt-missions", MISSIONS_ADM.filter(m => m.statut !== "Terminée" && m.statut !== "Abandonnée").length);
      MCOMS = {};
      try {
        const { data: cs } = await sb.from("missions_commentaires").select("*").order("cree_le", { ascending:true });
        (cs || []).forEach(c => { (MCOMS[c.mission_id] = MCOMS[c.mission_id] || []).push(c); });
      } catch(_){}
      if (!MISSIONS_ADM.length){ box.innerHTML = `<p style="color:var(--gris)">Aucune mission pour le moment.</p>`; return; }
      const nomDe = id => { const a = ADH.find(x => x.id === id); return a ? (nomComplet(a) || a.email) : "—"; };
      const pl = st => st === "Terminée" ? '<span class="pill ok">Terminée</span>'
        : st === "Abandonnée" ? '<span class="pill ko">Abandonnée</span>' : echapper(st);
      box.innerHTML = MISSIONS_ADM.map(m => {
        const coms = MCOMS[m.id] || [];
        const dernier = coms.length ? coms[coms.length - 1] : null;
        return `<div class="msg-c" style="border-left-color:${m.statut === "Terminée" ? "#1d6b3f" : m.assigne_a ? "var(--bleu-lagon)" : "var(--corail)"}">
          <div class="meta">${m.echeance ? `échéance ${new Date(m.echeance).toLocaleDateString("fr-FR")} · ` : ""}${m.assigne_a ? `assignée à <strong>${echapper(nomDe(m.assigne_a))}</strong>` : "<strong>ouverte à tous</strong>"} · ${pl(m.statut)}</div>
          <div style="font-weight:600;margin:0.2rem 0">${echapper(m.titre)}</div>
          ${m.description ? `<div style="white-space:pre-wrap;font-size:0.9rem">${echapper(m.description)}</div>` : ""}
          ${dernier ? `<div style="background:#f7f4ec;border-radius:8px;padding:0.45rem 0.7rem;margin-top:0.45rem;font-size:0.85rem"><span style="color:var(--gris);font-size:0.75rem">Dernier suivi — ${echapper(dernier.auteur_nom) || "—"} · ${new Date(dernier.cree_le).toLocaleDateString("fr-FR")}</span><br>${echapper(dernier.texte)}</div>` : ""}
          <div style="margin-top:0.5rem;display:flex;gap:0.4rem;flex-wrap:wrap">
            ${m.statut !== "Terminée" && m.statut !== "Abandonnée" ? `<button class="mini vert" onclick="cloreMission('${m.id}')">Marquer terminée</button>` : ""}
            <button class="mini clair" onclick="supprimerMission('${m.id}')">Supprimer</button>
          </div>
        </div>`;
      }).join("");
    }
    async function creerMission(){
      const titre = (document.getElementById("m-titre").value || "").trim();
      const desc = (document.getElementById("m-desc").value || "").trim();
      const qui = document.getElementById("m-qui").value || null;
      const ech = document.getElementById("m-ech").value || null;
      const msg = document.getElementById("mmsg");
      if (!titre){ msg.className = "message err"; msg.textContent = "Indiquez un titre."; return; }
      const { error } = await sb.from("missions").insert({
        titre, description: desc, assigne_a: qui, echeance: ech,
        cree_par_nom: MOI ? nomComplet(MOI) : "",
      });
      msg.className = "message " + (error ? "err" : "ok");
      msg.textContent = error ? "Erreur : " + error.message + " (migration-missions.sql lancée ?)" : "Mission confiée ✔ Elle apparaît sur la page « Mes missions » des assesseurs.";
      if (!error){ document.getElementById("m-titre").value = ""; document.getElementById("m-desc").value = ""; document.getElementById("m-ech").value = ""; }
      chargerMissionsAdmin();
    }
    async function cloreMission(id){
      const { error } = await sb.from("missions").update({ statut: "Terminée" }).eq("id", id);
      if (error) return alert("Erreur : " + error.message);
      chargerMissionsAdmin();
    }
    async function supprimerMission(id){
      if (!confirm("Supprimer cette mission ?")) return;
      const { error } = await sb.from("missions").delete().eq("id", id);
      if (error) return alert("Erreur : " + error.message);
      chargerMissionsAdmin();
    }

    /* ----- Démarches des adhérents (suivi des dossiers) ----- */
    async function chargerDemarchesBureau(){
      const box = document.getElementById("demarches-bureau");
      const { data, error } = await sb.from("demarches").select("*")
        .order("cree_le", { ascending:false }).limit(150);
      if (error){ box.innerHTML = `<p style="color:var(--gris)">Suivi non activé (déployez <strong>migration-demarches.sql</strong>).</p>`; return; }
      setCnt("cnt-demarches", (data || []).length);
      if (!data || !data.length){ box.innerHTML = `<p style="color:var(--gris)">Aucune démarche enregistrée pour le moment.</p>`; return; }
      const nomDe = id => { const a = ADH.find(x => x.id === id); return a ? (nomComplet(a) || a.email || "—") : "—"; };
      const pastille = r => r === "Résolu" ? '<span class="pill ok">Résolu</span>'
        : r === "Sans réponse" ? '<span class="pill ko">Sans réponse</span>'
        : echapper(r || "En attente");
      box.innerHTML = `<div style="overflow-x:auto"><table class="adh">
        <thead><tr><th>Date</th><th>Adhérent</th><th>Démarche</th><th>Destinataire</th><th>Mode</th><th>Suite</th></tr></thead><tbody>` +
        data.map(d => `<tr>
          <td>${d.date_demarche ? new Date(d.date_demarche).toLocaleDateString('fr-FR') : ''}</td>
          <td>${echapper(nomDe(d.auteur))}</td>
          <td><strong>${echapper(d.type)}</strong>${d.note ? `<br><span style="color:var(--gris);font-size:0.8rem">${echapper(d.note)}</span>` : ''}</td>
          <td>${echapper(d.destinataire)||'—'}</td><td>${echapper(d.mode)||'—'}</td>
          <td>${pastille(d.reponse)}</td>
        </tr>`).join("") + `</tbody></table></div>`;
    }

    /* ----- Statistiques détaillées des adhérents ----- */
    function compteur(arr, fn){
      const m = {};
      arr.forEach(a => { const k = (fn(a)||"").toString().trim() || "Non précisé"; m[k] = (m[k]||0)+1; });
      return Object.entries(m).sort((x,y) => y[1]-x[1]);
    }
    function dcard(titre, entries){
      const tot = entries.reduce((s,[,n]) => s+n, 0) || 1;
      const max = entries.length ? entries[0][1] : 1;
      const rows = entries.length ? entries.map(([k,n]) =>
        `<div class="drow"><span class="lib">${echapper(k)}</span>
          <span class="bar"><span style="width:${Math.round(n/max*100)}%"></span></span>
          <span class="n">${n} <small style="color:var(--gris);font-weight:500">(${Math.round(n/tot*100)}%)</small></span></div>`).join("")
        : `<div class="drow"><span class="lib" style="color:var(--gris)">Aucune donnée</span></div>`;
      return `<div class="dcard"><h3>${titre}</h3>${rows}</div>`;
    }
    function ageDe(a){
      if (!a.date_naissance) return null;
      const d = new Date(a.date_naissance); if (isNaN(d)) return null;
      const t = new Date(); let age = t.getFullYear()-d.getFullYear();
      const m = t.getMonth()-d.getMonth();
      if (m<0 || (m===0 && t.getDate()<d.getDate())) age--;
      return age;
    }
    function trancheAge(a){
      const age = ageDe(a);
      if (age==null) return "Non renseigné";
      if (age<30) return "Moins de 30 ans";
      if (age<45) return "30–44 ans";
      if (age<60) return "45–59 ans";
      return "60 ans et plus";
    }
    function rendreStatsDetail(){
      document.getElementById("stats-detail").innerHTML = `<div class="dcards">
        ${dcard("Par type d'adhésion", compteur(ADH, a=>a.type_adhesion))}
        ${dcard("Par nuisance subie", compteur(ADH, a=>a.type_nuisance))}
        ${dcard("Par commune", compteur(ADH, a=>a.commune))}
        ${dcard("Par statut de cotisation", compteur(ADH, a=>estAJour(a)?"À jour":"En retard"))}
        ${dcard("Par tranche d'âge", compteur(ADH, a=>trancheAge(a)))}
      </div>`;
    }

    /* ----- Communication aux membres ----- */
    function destinatairesPour(cible){
      return ADH.filter(a => cible==="ajour" ? estAJour(a) : cible==="retard" ? !estAJour(a) : true);
    }
    function normTel(t){
      let n = (t||"").replace(/[^0-9+]/g,"");
      if (/^\d{8}$/.test(n)) n = "+689"+n;   // numéro local PF à 8 chiffres
      return n;
    }
    function emailsCibles(){ const c=document.getElementById("com-cible").value; return [...new Set(destinatairesPour(c).map(a=>(a.email||"").trim()).filter(Boolean))]; }
    function telsCibles(){ const c=document.getElementById("com-cible").value; return [...new Set(destinatairesPour(c).map(a=>normTel(a.telephone)).filter(Boolean))]; }
    function majResume(){
      const dest = destinatairesPour(document.getElementById("com-cible").value);
      const ne = emailsCibles().length, nt = telsCibles().length;
      document.getElementById("com-resume").innerHTML = `<strong>${dest.length}</strong> membre(s) ciblé(s) · ${ne} avec e-mail · ${nt} avec téléphone`;
    }
    function rendreCommunication(){
      document.getElementById("communication").innerHTML = `
        <div class="form-wrap" style="max-width:100%;margin:0 0 1.2rem">

          <p class="com-etape premiere">1 · Écrire le message</p>
          <div class="champ"><label>Audience</label>
            <select id="com-cible">
              <option value="tous">Tous les adhérents</option>
              <option value="ajour">À jour de cotisation</option>
              <option value="retard">Non à jour de cotisation</option>
            </select>
            <p id="com-resume" style="font-size:0.85rem;color:var(--gris);margin-top:0.3rem"></p></div>
          <div class="champ"><label>Titre / objet</label><input id="com-titre" placeholder="Ex. Réunion publique le 12 juillet à 18h"></div>
          <div class="champ" style="margin-bottom:0.4rem"><label>Message</label><textarea id="com-corps" rows="4" placeholder="Votre message aux membres…"></textarea></div>

          <p class="com-etape">2 · Publier sur le site</p>
          <p class="com-hint">L'annonce s'affiche dans l'espace des membres ciblés, avec notification push et pastille dans le menu. C'est le canal principal.</p>
          <div class="champ"><label>Date et heure de l'événement <span style="font-weight:400;color:var(--gris)">— optionnel : l'annonce clignote jusque-là, puis disparaît</span></label>
            <input type="datetime-local" id="com-date"></div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="btn btn-vert" id="btn-publier" onclick="publierAnnonce()">Publier l'annonce</button>
            <button class="btn btn-clair" id="btn-annuler-edit" onclick="annulerEdition()" style="display:none">Annuler la modification</button>
          </div>

          <p class="com-etape">3 · Doubler l'envoi <span style="font-weight:400;color:var(--gris)">(optionnel)</span></p>
          <p class="com-hint">Pour joindre aussi les membres en dehors du site : ouvre votre messagerie avec le message déjà prêt. Conseillé pour les convocations (e-mail) et les rappels urgents (SMS).</p>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="btn btn-clair" onclick="envoyerEmailRapide()">✉️ E-mail (Cci)</button>
            <button class="btn btn-clair" onclick="envoyerSMSRapide()">📱 SMS</button>
          </div>
          <details class="com-plus">
            <summary>Autres options ▾</summary>
            <div class="corps">
              <button class="btn btn-clair" onclick="copierEmails(this)">Copier les e-mails</button>
              <button class="btn btn-clair" onclick="copierTels(this)">Copier les numéros</button>
              <button class="btn btn-clair" onclick="envoyerEmailMasse(this)" title="Nécessite le backend Resend déployé (voir COMMUNICATION.md)">Envoi en masse (à activer)</button>
            </div>
            <p class="com-hint" style="margin-top:0.4rem">« Copier » récupère la liste des adresses / numéros de l'audience, à coller où vous voulez. L'« envoi en masse » servira quand l'association comptera des centaines de membres.</p>
          </details>
        </div>
        <h3 style="color:var(--bleu-fonce);margin-bottom:0.6rem">Annonces publiées</h3>
        <div id="annonces-liste"><p style="color:var(--gris)">Chargement…</p></div>`;
      document.getElementById("com-cible").addEventListener("change", majResume);
      majResume();
      chargerAnnonces();
    }
    function envoyerEmailRapide(){
      const sujet = document.getElementById("com-titre").value.trim();
      const corps = document.getElementById("com-corps").value.trim();
      const emails = emailsCibles();
      if (!emails.length) return alert("Aucun destinataire avec e-mail dans cette audience.");
      const url = `mailto:?bcc=${encodeURIComponent(emails.join(","))}&subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
      if (url.length > 1900 && !confirm(`Liste longue (${emails.length} destinataires) : certains logiciels mail la tronquent. Continuer ? (sinon, « Copier les e-mails » ou « Envoi en masse »)`)) return;
      window.location.href = url;
    }
    function copier(txt, btn){ navigator.clipboard.writeText(txt).then(()=>{ const t=btn.textContent; btn.textContent="Copié ✓"; setTimeout(()=>btn.textContent=t,1500); }).catch(()=>alert("Copie impossible.")); }
    function copierEmails(btn){ const e=emailsCibles(); if(!e.length) return alert("Aucun e-mail."); copier(e.join(", "), btn); }
    function copierTels(btn){ const t=telsCibles(); if(!t.length) return alert("Aucun numéro."); copier(t.join(", "), btn); }
    function envoyerSMSRapide(){
      const corps = document.getElementById("com-corps").value.trim();
      const tels = telsCibles();
      if (!tels.length) return alert("Aucun destinataire avec téléphone dans cette audience.");
      // Ouvre l'application de messagerie du téléphone (envoi via votre abonnement).
      window.location.href = `sms:${tels.join(",")}?&body=${encodeURIComponent(corps)}`;
    }
    async function envoyerEmailMasse(btn){
      const sujet = document.getElementById("com-titre").value.trim();
      const corps = document.getElementById("com-corps").value.trim();
      const cible = document.getElementById("com-cible").value;
      if (!sujet || !corps) return alert("Indiquez un titre et un message.");
      if (!confirm("Envoyer cet e-mail en masse via le serveur ?")) return;
      const t = btn.textContent; btn.textContent = "Envoi…";
      try {
        const { data, error } = await sb.functions.invoke("diffusion-email", { body: { sujet, corps, cible } });
        if (error) throw error;
        alert("Envoi déclenché : " + (data && data.envoyes!=null ? data.envoyes+" e-mail(s)" : "OK"));
      } catch(e){ alert("L'envoi en masse n'est pas encore activé.\nIl faut déployer le backend Resend (voir COMMUNICATION.md).\nEn attendant, utilisez « E-mail (Cci) » ou « Copier les e-mails »."); }
      btn.textContent = t;
    }
    function toLocalDatetime(iso){
      const d = new Date(iso); if (isNaN(d)) return "";
      const p = n => String(n).padStart(2,"0");
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function annulerEdition(){
      EDIT_ID = null;
      document.getElementById("com-titre").value = "";
      document.getElementById("com-corps").value = "";
      document.getElementById("com-date").value = "";
      document.getElementById("btn-publier").textContent = "Publier l'annonce";
      document.getElementById("btn-annuler-edit").style.display = "none";
    }
    function modifierAnnonce(id){
      const an = ANNONCES.find(x => x.id === id); if (!an) return;
      EDIT_ID = id;
      document.getElementById("com-titre").value = an.titre || "";
      document.getElementById("com-corps").value = an.corps || "";
      document.getElementById("com-cible").value = an.cible || "tous"; majResume();
      document.getElementById("com-date").value = an.date_evenement ? toLocalDatetime(an.date_evenement) : "";
      document.getElementById("btn-publier").textContent = "Mettre à jour l'annonce";
      document.getElementById("btn-annuler-edit").style.display = "";
      document.getElementById("communication").scrollIntoView({ behavior:"smooth", block:"start" });
    }
    async function publierAnnonce(){
      const titre = document.getElementById("com-titre").value.trim();
      const corps = document.getElementById("com-corps").value.trim();
      const cible = document.getElementById("com-cible").value;
      const dv = document.getElementById("com-date").value;
      const date_evenement = dv ? new Date(dv).toISOString() : null;
      if (!titre || !corps) return alert("Indiquez un titre et un message.");
      const wasEdit = !!EDIT_ID;
      const payload = { titre, corps, cible, date_evenement };
      let res = EDIT_ID
        ? await sb.from("annonces").update(payload).eq("id", EDIT_ID)
        : await sb.from("annonces").insert(Object.assign({ auteur_nom: MOI ? MOI.nom : "" }, payload));
      // Filet de secours si la colonne date_evenement n'est pas encore ajoutée.
      if (res.error && /date_evenement|column|schema cache/i.test(res.error.message||"")){
        const p2 = { titre, corps, cible };
        res = EDIT_ID
          ? await sb.from("annonces").update(p2).eq("id", EDIT_ID)
          : await sb.from("annonces").insert(Object.assign({ auteur_nom: MOI ? MOI.nom : "" }, p2));
      }
      if (res.error) return alert("Erreur : "+res.error.message+"\n(Avez-vous déployé migration-communication.sql ?)");
      // Notification push automatique (uniquement pour une NOUVELLE annonce ;
      // une simple modification ne renvoie pas de notification).
      let infoPush = "";
      if (!wasEdit){
        try {
          const { data, error } = await sb.functions.invoke("envoi-push", { body: { titre, corps, cible } });
          if (error) throw error;
          infoPush = (data && data.envoyes != null) ? `\nNotifications push : ${data.envoyes} envoyée(s).` : "";
        } catch(_) { infoPush = "\n(Notification push non envoyée — voir PUSH.md.)"; }
      }
      annulerEdition();
      alert((wasEdit ? "Annonce mise à jour ✔" : "Annonce publiée ✔ (visible dans l'espace des membres).") + infoPush);
      chargerAnnonces();
    }
    async function chargerAnnonces(){
      const box = document.getElementById("annonces-liste");
      const { data, error } = await sb.from("annonces").select("*").order("cree_le", { ascending:false });
      if (error){ box.innerHTML = `<p style="color:var(--gris)">Annonces non activées (déployez <strong>migration-communication.sql</strong>).</p>`; return; }
      ANNONCES = data || [];
      if (!data || !data.length){ box.innerHTML = `<p style="color:var(--gris)">Aucune annonce publiée.</p>`; return; }
      const lib = c => c==="ajour" ? "à jour" : c==="retard" ? "non à jour" : "tous";
      const now = new Date();
      box.innerHTML = data.map(an => {
        const evt = an.date_evenement ? new Date(an.date_evenement) : null;
        const expiree = evt && evt < now;
        const evtTxt = evt ? `${evt.toLocaleDateString('fr-FR')} à ${evt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}` : null;
        return `<div class="msg-c ${expiree?'lu':''}">
          <div class="meta">${new Date(an.cree_le).toLocaleString('fr-FR')} · cible : <strong>${lib(an.cible)}</strong>${evtTxt?` · événement : <strong>${evtTxt}</strong>`:''}${expiree?' <span class="pill ko">expirée</span>':''}</div>
          <div style="font-weight:600;margin:0.2rem 0">${echapper(an.titre)}</div>
          <div style="white-space:pre-wrap">${echapper(an.corps)}</div>
          <div style="margin-top:0.5rem;display:flex;gap:0.4rem;flex-wrap:wrap">
            <button class="mini vert" onclick="modifierAnnonce('${an.id}')">Modifier</button>
            <button class="mini clair" onclick="supprimerAnnonce('${an.id}')">Supprimer</button>
          </div>
        </div>`;
      }).join("");
    }
    async function supprimerAnnonce(id){
      if (!confirm("Supprimer cette annonce ?")) return;
      const { error } = await sb.from("annonces").delete().eq("id", id);
      if (error) return alert("Erreur : "+error.message);
      chargerAnnonces();
    }

    // Compteur affiché dans le titre d'une section repliable.
    function setCnt(id, n){ const el = document.getElementById(id); if (el) el.textContent = n > 0 ? n : ""; }

    async function chargerMessages(){
      const box = document.getElementById("messages");
      const { data, error } = await sb.from("messages_contact").select("*").order("cree_le", { ascending:false });
      if (error){ box.innerHTML = `<p style="color:var(--gris)">Messagerie de contact non activée (déployez <strong>migration-contact.sql</strong>).</p>`; return; }
      setCnt("cnt-messages", (data || []).filter(m => !m.traite).length);
      if (!data || !data.length){ box.innerHTML = `<p style="color:var(--gris)">Aucun message pour le moment.</p>`; return; }
      box.innerHTML = data.map(m => {
        const mail = encodeURIComponent(m.email||"");
        return `<div class="msg-c ${m.traite?'lu':''}">
          <div class="meta"><strong>${echapper((m.prenom||'')+' '+(m.nom||''))}</strong> · ${echapper(m.commune)||'—'} · ${echapper(m.email)||''} · ${new Date(m.cree_le).toLocaleString('fr-FR')} ${m.traite?'<span class="pill ok">traité</span>':''}</div>
          <div style="font-weight:600;margin:0.2rem 0">${echapper(m.sujet)||'(sans sujet)'}</div>
          <div>${echapper(m.message)}</div>
          <div style="margin-top:0.5rem;display:flex;gap:0.4rem;flex-wrap:wrap">
            <a class="mini clair" href="mailto:${mail}?subject=${encodeURIComponent('Re: '+(m.sujet||''))}">Répondre</a>
            ${!m.traite?`<button class="mini vert" onclick="marquerTraite('${m.id}')">Marquer traité</button>`:''}
          </div>
        </div>`;
      }).join("");
    }
    async function marquerTraite(id){
      const { error } = await sb.from("messages_contact").update({ traite:true }).eq("id", id);
      if (error) return alert("Erreur : "+error.message);
      chargerMessages();
    }

    function estAJour(a){
      return a.cotisation_payee && (!a.cotisation_echeance || new Date(a.cotisation_echeance) >= new Date());
    }
    function dessiner(){
      const q = (document.getElementById("q").value||"").toLowerCase();
      const f = document.getElementById("filtre").value;
      const lignes = ADH.filter(a => {
        const m = (a.nom+" "+(a.prenom||"")+" "+(a.email||"")).toLowerCase().includes(q);
        const fo = f===""||(f==="ok"&&estAJour(a))||(f==="ko"&&!estAJour(a));
        return m && fo;
      }).map(a => {
        const echISO = (a.cotisation_echeance||"").slice(0,10);
        const echFr = a.cotisation_echeance ? new Date(a.cotisation_echeance).toLocaleDateString("fr-FR") : "—";
        return `
        <tr>
          <td>${echapper(nomComplet(a))||'—'}${a.role==='bureau'?' <span class="pill ok">bureau</span>':''}</td>
          <td>${echapper(a.email)||'—'}</td>
          <td>${echapper(a.commune)||'—'}</td>
          <td>${estAJour(a)?'<span class="pill ok">À jour</span>':'<span class="pill ko">En retard</span>'}</td>
          <td>${echFr}</td>
          <td>
            <div class="act">
              <input type="date" class="ech" id="ech-${a.id}" value="${echISO}" title="Date d'échéance">
              <label><input type="checkbox" id="pay-${a.id}" ${a.cotisation_payee?'checked':''}> payée</label>
              <button class="mini vert" onclick="enregistrerCoti('${a.id}')">Enregistrer</button>
              <button class="mini clair" onclick="payerUnAn('${a.id}')" title="Marque payé, échéance dans 1 an">+1 an</button>
              ${!estAJour(a)?`<button class="mini clair" onclick="relancer('${encodeURIComponent(a.email||'')}')">Relancer</button>`:''}
            </div>
          </td>
        </tr>`; }).join("");
      document.getElementById("tableau").innerHTML = `
        <table class="adh"><thead><tr><th>Nom</th><th>E-mail</th><th>Commune</th><th>Cotisation</th><th>Échéance</th><th>Actions</th></tr></thead>
        <tbody>${lignes||'<tr><td colspan="6" style="text-align:center;color:var(--gris)">Aucun adhérent</td></tr>'}</tbody></table>`;
    }
    // Enregistre l'échéance saisie (date) et l'état "payée" pour un adhérent.
    async function enregistrerCoti(id){
      const echeance = (document.getElementById("ech-"+id).value || "") || null;
      const paye = document.getElementById("pay-"+id).checked;
      const { error } = await sb.from("profils").update({ cotisation_payee:paye, cotisation_echeance:echeance }).eq("id", id);
      if (error) return alert("Erreur : "+error.message);
      const a = ADH.find(x=>x.id===id); a.cotisation_payee=paye; a.cotisation_echeance=echeance;
      dessiner();
    }
    // Raccourci : marque payé, échéance dans un an à compter d'aujourd'hui.
    async function payerUnAn(id){
      const ech = new Date(); ech.setFullYear(ech.getFullYear()+1);
      const echeance = ech.toISOString().slice(0,10);
      const { error } = await sb.from("profils").update({ cotisation_payee:true, cotisation_echeance:echeance }).eq("id", id);
      if (error) return alert("Erreur : "+error.message);
      const a = ADH.find(x=>x.id===id); a.cotisation_payee=true; a.cotisation_echeance=echeance;
      dessiner();
    }
    function relancer(email){
      const e = decodeURIComponent(email);
      location.href = `mailto:${e}?subject=${encodeURIComponent("Te Ora Hau — renouvellement de votre cotisation")}`+
        `&body=${encodeURIComponent("Ia ora na,\n\nVotre cotisation à l'association Te Ora Hau arrive à échéance. Merci de penser à la renouveler pour continuer à soutenir notre action contre les nuisances sonores.\n\nMauruuru,\nLe bureau de Te Ora Hau")}`;
    }
    function exportCSV(){
      const en = ["Nom","Prenom","Email","Telephone","Commune","Type adhesion","Type nuisance","Cotisation payee","Echeance","Role"];
      const lignes = ADH.map(a => [a.nom,a.prenom,a.email,a.telephone,a.commune,a.type_adhesion,a.type_nuisance,a.cotisation_payee,a.cotisation_echeance,a.role]
        .map(v => `"${String(v==null?'':v).replace(/"/g,'""')}"`).join(","));
      const csv = en.join(",")+"\n"+lignes.join("\n");
      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = "adherents-te-ora-hau.csv"; a.click();
    }
  </script>
</body>
</html>
