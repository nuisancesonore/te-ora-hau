<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon espace · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .layout { display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; align-items:start; }
    @media (max-width:760px){ .layout{ grid-template-columns:1fr; } }
    .carte-membre {
      background: linear-gradient(135deg, var(--bleu-fonce), var(--bleu-lagon));
      color:#fff; border-radius:18px; padding:1.6rem; box-shadow:var(--ombre);
    }
    .carte-membre .ligne { display:flex; justify-content:space-between; align-items:center; }
    .carte-membre h3 { font-size:1.3rem; }
    .carte-membre .label { font-size:0.72rem; opacity:0.8; text-transform:uppercase; letter-spacing:1px; }
    .carte-membre .val { font-size:1rem; font-weight:600; margin-bottom:0.6rem; }
    .badge { display:inline-block; padding:0.25rem 0.7rem; border-radius:20px; font-size:0.8rem; font-weight:700; }
    .badge.ok { background:#1d6b3f; }
    .badge.ko { background:#b2381f; }
    #qr { background:#fff; padding:8px; border-radius:10px; width:fit-content; }
    .rappel-coti { border-radius:10px; padding:0.7rem 0.9rem; font-size:0.9rem; margin-bottom:0.8rem; }
    .rappel-coti.r-urgent { background:#fce6e1; color:#b2381f; border:1px solid #f3c2b6; }
    .rappel-coti.r-doux { background:#fff4e0; color:#8a5a00; border:1px solid #f0d9a8; }
    .grp-titre { font-weight:700; color:var(--bleu-fonce); margin:0.4rem 0 0.5rem; font-size:0.95rem; }
    .bloc-completer { background:#fff8ef; border:1px solid #f0d9a8; border-radius:10px; padding:0.9rem 1rem; margin-top:1rem; }
    .bloc-completer .grp-titre { margin-top:0; }
    .badge-todo { background:#8a5a00; color:#fff; font-size:0.7rem; font-weight:700; padding:0.1rem 0.5rem; border-radius:20px; margin-left:0.4rem; vertical-align:middle; }
    .annonce { background:#fff; border-radius:12px; box-shadow:var(--ombre); border-left:4px solid var(--bleu-lagon); padding:1rem 1.2rem; margin-bottom:0.9rem; }
    .annonce h4 { color:var(--bleu-fonce); font-size:1.08rem; margin:0 0 0.4rem; }
    .annonce .corps { white-space:pre-wrap; line-height:1.55; }
    .annonce .date { font-size:0.78rem; color:var(--gris); margin-top:0.6rem; }
    .annonce .evt { color:var(--corail); font-weight:700; margin-bottom:0.3rem; }
    @keyframes clignote-annonce { 0%,100% { box-shadow:var(--ombre); } 50% { box-shadow:0 0 0 3px rgba(255,122,89,0.55), var(--ombre); } }
    .annonce.urgent { border-left-color:var(--corail); animation:clignote-annonce 1.2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce){ .annonce.urgent { animation:none; box-shadow:0 0 0 3px rgba(255,122,89,0.5), var(--ombre); } }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <main id="contenu"><p style="color:var(--gris)">Chargement…</p></main>
  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function() {
      await initPage("espace");
      const contenu = document.getElementById("contenu");
      const profil = await monProfil();
      if (!profil) {
        contenu.innerHTML = `<div class="verrou"><div class="ico">🔒</div>
          <h2 style="color:var(--bleu-fonce)">Connexion requise</h2>
          <p style="margin:0.6rem 0 1.2rem;color:var(--gris)">Connectez-vous pour accéder à votre espace.</p>
          <a href="connexion.html" class="btn btn-primaire">Se connecter</a></div>`;
        return;
      }
      // Applique les infos complémentaires mémorisées à l'inscription
      // (cas où l'e-mail devait être confirmé avant la 1re connexion).
      try {
        const raw = localStorage.getItem("TOH_profil_complement");
        if (raw) {
          const comp = JSON.parse(raw);
          const maj = {};
          if (comp.type_adhesion && !profil.type_adhesion) maj.type_adhesion = comp.type_adhesion;
          if (comp.date_naissance && !profil.date_naissance) maj.date_naissance = comp.date_naissance;
          if (comp.adresse && !profil.adresse) maj.adresse = comp.adresse;
          if (comp.telephone && !profil.telephone) maj.telephone = comp.telephone;
          if (Object.keys(maj).length) {
            let { error } = await sb.from("profils").update(maj).eq("id", profil.id);
            if (error) { const m2 = Object.assign({}, maj); delete m2.date_naissance; delete m2.adresse; delete m2.telephone; await sb.from("profils").update(m2).eq("id", profil.id); }
            Object.assign(profil, maj);
          }
          localStorage.removeItem("TOH_profil_complement");
        }
      } catch (_) {}

      const st = statutCotisation(profil);
      const aJour = st.aJour;
      const acces = profil.role === "bureau" || aJour;   // accès complet ?
      // Type de nuisance : aligné sur la liste des signalements (si l'ancienne
      // valeur libre ne correspond pas, on laisse vide pour re-choisir).
      const nuis = SIG_TYPES.includes(profil.type_nuisance || "") ? profil.type_nuisance : "";

      // Rappel de cotisation à la connexion : 2 mois avant, puis 1 mois avant.
      let rappel = "";
      const _j = st.joursRestants;
      if (profil.role !== "bureau" && !aJour && _j === null) {
        rappel = `<div class="rappel-coti r-urgent">Votre <strong>accès complet</strong> (carte détaillée, signaler, forum, annuaire, outils) se débloque dès que votre <strong>cotisation</strong> a été reçue et <strong>validée par le bureau</strong> de Te Ora Hau. Voir <a href="cotiser.html">comment cotiser</a>.</div>`;
      } else if (_j !== null) {
        if (_j < 0)
          rappel = `<div class="rappel-coti r-urgent">Votre cotisation est <strong>échue</strong> depuis le ${st.echeance}. Renouvelez-la pour continuer à soutenir l'association et bénéficier de son aide.</div>`;
        else if (_j <= 30)
          rappel = `<div class="rappel-coti r-urgent">Votre cotisation arrive à échéance <strong>dans ${_j} jour${_j>1?'s':''}</strong> (le ${st.echeance}). Pensez à la renouveler dès maintenant.</div>`;
        else if (_j <= 60)
          rappel = `<div class="rappel-coti r-doux">Votre cotisation arrive à échéance le <strong>${st.echeance}</strong> (dans ${_j} jours). Vous pouvez déjà la renouveler.</div>`;
      }

      contenu.innerHTML = `
        <h2 class="section-titre">Mon espace adhérent</h2>
        ${!nuis ? `<div class="rappel-coti r-doux" style="margin-bottom:1rem">Complétez votre profil : indiquez le <strong>type de nuisance</strong> que vous subissez (encadré « À compléter », plus bas). Cela aide l'association à cibler ses actions.</div>` : ''}
        <div id="annonces" style="margin-bottom:1.4rem"></div>
        <div class="layout">
          <div>
            <div class="carte-membre">
              <div class="ligne">
                <div><div class="label">Membre</div><h3>${echapper(nomComplet(profil))}</h3></div>
                <span class="badge ${(aJour||profil.role==='bureau')?'ok':'ko'}">${profil.role==='bureau'?'Bureau':(aJour?'À jour':'Cotisation à régler')}</span>
              </div>
              <div style="display:flex;gap:1.4rem;margin:1.2rem 0 0.4rem;flex-wrap:wrap;align-items:flex-end">
                <div>
                  <div class="label">Commune</div><div class="val">${echapper(profil.commune)||'—'}</div>
                  <div class="label">Période de cotisation</div><div class="val" style="font-size:0.85rem">${st.debutDate ? `du ${st.debut} au ${st.echeance}` : '—'}</div>
                  <div class="label">Carte n°</div><div class="val" style="font-size:0.8rem">${st.numero}</div>
                </div>
                <div id="qr"></div>
              </div>
            </div>
            ${acces ? `
            <div class="carte" style="margin-top:1.2rem;border-top-color:var(--vert-paix)">
              <h3>Agir</h3>
              <p style="color:var(--gris)">Un bruit vous gêne ? Signalez-le sur la carte, puis appuyez votre démarche avec un courrier et votre journal de bruit.</p>
              <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.6rem">
                <a href="signaler.html" class="btn btn-vert">Signaler une nuisance</a>
                <a href="outils.html" class="btn btn-clair">Courriers &amp; journal</a>
                <a href="outils.html#demarches" class="btn btn-clair">Mon suivi de démarches</a>
              </div>
            </div>` : ``}
            <div class="carte" style="margin-top:1.2rem;border-top-color:var(--corail)">
              <h3>Cotisation</h3>
              ${rappel}
              <p style="color:var(--gris)">Réglez par virement, chèque ou espèces. Votre statut sera mis à jour par le bureau après réception.</p>
              <a href="cotiser.html" class="btn btn-primaire" style="margin-top:0.5rem">Comment payer ma cotisation →</a>
            </div>
            ${acces ? `
            <div class="carte" style="margin-top:1.2rem;border-top-color:var(--bleu-lagon)">
              <h3>Mes signalements</h3>
              <p style="color:var(--gris)">Consultez, modifiez ou supprimez les nuisances que vous avez signalées.</p>
              <a href="mes-signalements.html" class="btn btn-clair" style="margin-top:0.5rem">Gérer mes signalements</a>
            </div>
            <div class="carte" style="margin-top:1.2rem">
              <h3>Annuaire des adhérents</h3>
              <p style="color:var(--gris)">Retrouvez les membres de votre commune qui ont accepté d'être visibles, pour vous entraider entre voisins.</p>
              <a href="annuaire.html" class="btn btn-clair" style="margin-top:0.5rem">Consulter l'annuaire</a>
            </div>
            <div class="carte" style="margin-top:1.2rem">
              <h3>Forum des membres</h3>
              <p style="color:var(--gris)">Échangez avec les autres adhérents, posez vos questions et partagez vos démarches.</p>
              <a href="forum.html" class="btn btn-clair" style="margin-top:0.5rem">Ouvrir le forum</a>
            </div>` : `
            <div class="carte" style="margin-top:1.2rem;opacity:0.85">
              <h3>🔒 Bientôt débloqué</h3>
              <p style="color:var(--gris)">Dès que le bureau aura validé votre cotisation, vous aurez accès à&nbsp;: <strong>signaler une nuisance</strong>, la <strong>carte détaillée</strong>, le <strong>forum</strong>, l'<strong>annuaire</strong> et les <strong>outils</strong> (courriers, journal de bruit).</p>
            </div>`}
            <div class="carte" style="margin-top:1.2rem">
              <h3>Notifications</h3>
              <p style="color:var(--gris)" id="notif-txt">Recevez une alerte (et un chiffre sur l'icône) quand l'association publie une annonce.</p>
              <button class="btn btn-clair" id="btn-notif" style="margin-top:0.5rem">Activer les notifications</button>
            </div>
          </div>

          <div class="form-wrap" style="max-width:100%;margin:0">
            <h2 style="color:var(--bleu-fonce)">Mon profil</h2>
            <p class="intro">Vos coordonnées sont reprises de votre inscription : rien à retaper. Il reste à indiquer le type de nuisance que vous subissez.</p>
            <div id="msg" class="message"></div>
            <form id="form-profil">
              <p class="grp-titre">Mes coordonnées</p>
              <div class="champ"><label>Nom</label><input id="nom" value="${echapper(profil.nom)}" required></div>
              <div class="champ"><label>Prénom</label><input id="prenom" value="${echapper(profil.prenom)}"></div>
              <div class="champ"><label>Date de naissance</label><input type="date" id="date_naissance" value="${echapper(profil.date_naissance)}"></div>
              <div class="champ"><label>Commune de résidence</label><select id="commune"></select>
                <input id="commune_autre" placeholder="Île puis commune (ex. Raiatea, Uturoa)" style="display:none;margin-top:0.5rem"></div>
              <div class="champ"><label>Adresse</label><input id="adresse" value="${echapper(profil.adresse)}" placeholder="Quartier, rue, lotissement…"></div>
              <div class="champ"><label>Téléphone <span style="font-weight:400;color:var(--gris)">— pour les SMS de l'association</span></label><input id="telephone" type="tel" value="${echapper(profil.telephone)}" placeholder="Ex. 87 12 34 56"></div>

              <div class="bloc-completer">
                <p class="grp-titre">À compléter ${nuis ? '' : '<span class="badge-todo">à renseigner</span>'}</p>
                <p style="font-size:0.83rem;color:var(--gris);margin:-0.25rem 0 0.7rem">Ces informations ne sont pas demandées à l'inscription.</p>
                <div class="champ"><label>Type de nuisance subie</label>
                  <select id="type_nuisance">${optionsListe(SIG_TYPES, nuis, "— Choisir —")}</select></div>
                <div class="champ" style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0">
                  <input type="checkbox" id="annuaire" style="width:auto" ${profil.annuaire_optin?'checked':''}>
                  <label for="annuaire" style="margin:0">Apparaître dans l'annuaire des membres (même commune)</label>
                </div>
              </div>

              <button type="submit" class="btn btn-primaire btn-bloc" style="margin-top:1rem">Enregistrer</button>
            </form>
          </div>
        </div>`;

      // QR code de la carte
      new QRCode(document.getElementById("qr"), {
        text: "TOH-MEMBRE:" + profil.id, width: 96, height: 96,
        colorDark: "#064a54", colorLight: "#ffffff",
      });

      // Sélecteur commune
      const sel = document.getElementById("commune");
      sel.innerHTML = optionsCommunes(profil.commune);
      const valCommune = brancherCommuneAutre(sel, document.getElementById("commune_autre"));

      // Annonces de l'association visibles par ce membre (selon le ciblage).
      (async () => {
        const { data } = await sb.from("annonces").select("*").order("cree_le", { ascending:false });
        if (!data || !data.length) return;
        const voitTout = profil.role === "bureau";
        const maintenant = new Date();
        const vis = data.filter(an => {
          const okCible = voitTout || an.cible==="tous" || (an.cible==="ajour"&&aJour) || (an.cible==="retard"&&!aJour);
          if (!okCible) return false;
          // Une annonce d'événement disparaît une fois la date/heure passée.
          if (an.date_evenement && new Date(an.date_evenement) < maintenant) return false;
          return true;
        });
        // Marque les annonces comme "vues" (efface la pastille / met à jour le badge d'icône).
        localStorage.setItem("TOH_vu_annonces", String(vis.length ? new Date(vis[0].cree_le).getTime() : Date.now()));
        try { rafraichirBadge(profil); } catch(_){}
        if (!vis.length) return;
        document.getElementById("annonces").innerHTML =
          `<h3 style="color:var(--bleu-fonce);margin-bottom:0.7rem">Annonces de l'association</h3>` +
          vis.slice(0,5).map(an => {
            const evt = an.date_evenement ? new Date(an.date_evenement) : null;
            const aVenir = evt && evt >= maintenant;
            const evtTxt = evt ? `${evt.toLocaleDateString('fr-FR')} à ${evt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}` : null;
            return `<div class="annonce ${aVenir?'urgent':''}">
              <h4>${echapper(an.titre)}</h4>
              ${evtTxt?`<div class="evt">Événement : ${evtTxt}</div>`:''}
              <div class="corps">${echapper(an.corps)}</div>
              <div class="date">Publié le ${new Date(an.cree_le).toLocaleDateString('fr-FR')}</div>
            </div>`;
          }).join("");
      })();

      // Réglage des notifications push (activer / désactiver sur cet appareil).
      (async () => {
        const btn = document.getElementById("btn-notif");
        const txt = document.getElementById("notif-txt");
        if (!btn) return;
        function refl(e){
          if (e === "non-supporte"){ btn.style.display="none"; txt.textContent = "Les notifications ne sont pas supportées sur cet appareil."; }
          else if (e === "non-configure"){ btn.style.display="none"; txt.textContent = "Notifications bientôt disponibles."; }
          else if (e === "refuse"){ btn.style.display="none"; txt.textContent = "Notifications bloquées dans les réglages du navigateur/téléphone."; }
          else if (e === "actif"){ btn.textContent = "Désactiver les notifications"; txt.textContent = "Notifications activées sur cet appareil ✔"; }
          else { btn.textContent = "Activer les notifications"; txt.textContent = "Recevez une alerte (et un chiffre sur l'icône) quand l'association publie une annonce. Pensez à installer le site sur votre écran d'accueil."; }
        }
        refl(await etatNotifications());
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const actif = (await etatNotifications()) === "actif";
          if (actif) await desactiverNotifications(); else await activerNotifications();
          refl(await etatNotifications());
          btn.disabled = false;
        });
      })();

      const msg = document.getElementById("msg");
      document.getElementById("form-profil").addEventListener("submit", async function(e) {
        e.preventDefault();
        const maj = {
          nom: document.getElementById("nom").value.trim(),
          prenom: document.getElementById("prenom").value.trim(),
          commune: valCommune(),
          type_nuisance: document.getElementById("type_nuisance").value.trim(),
          annuaire_optin: document.getElementById("annuaire").checked,
          date_naissance: document.getElementById("date_naissance").value || null,
          adresse: document.getElementById("adresse").value.trim(),
          telephone: document.getElementById("telephone").value.trim(),
        };
        let { error } = await sb.from("profils").update(maj).eq("id", profil.id);
        let partiel = false;
        // Filet de secours : si des colonnes récentes n'existent pas encore,
        // on réessaie sans elles plutôt que d'échouer.
        if (error && /column|schema cache|date_naissance|adresse|telephone|prenom/i.test(error.message||"")){
          const maj2 = Object.assign({}, maj); delete maj2.date_naissance; delete maj2.adresse; delete maj2.telephone; delete maj2.prenom;
          const retry = await sb.from("profils").update(maj2).eq("id", profil.id);
          error = retry.error; partiel = !error;
        }
        msg.className = "message " + (error ? "err" : "ok");
        msg.textContent = error ? "Erreur : " + error.message
          : (partiel
              ? "Profil enregistré ✔ (certaines infos seront prises en compte une fois la base mise à jour)"
              : "Profil enregistré ✔");
      });
    })();
  </script>
</body>
</html>
