<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .onglets{ display:flex; gap:0.5rem; margin-bottom:1.4rem; flex-wrap:wrap; }
    .onglets button{ padding:0.55rem 1.1rem; border:none; border-radius:10px; cursor:pointer; font-weight:600; background:#fff; box-shadow:var(--ombre); }
    .onglets button.actif{ background:var(--bleu-fonce); color:#fff; }
    .panneau{ display:none; } .panneau.actif{ display:block; }
    pre.lettre{ background:#fff; border-radius:12px; padding:1.5rem; box-shadow:var(--ombre); white-space:pre-wrap; font-family:Georgia,serif; line-height:1.6; }
    table.jb{ width:100%; border-collapse:collapse; background:#fff; box-shadow:var(--ombre); border-radius:10px; overflow:hidden; margin-top:1rem; }
    table.jb th,table.jb td{ padding:0.55rem 0.7rem; border-bottom:1px solid #eee; font-size:0.88rem; text-align:left; }
    table.jb th{ background:var(--bleu-fonce); color:#fff; }
    pre.lettre{ max-height:560px; overflow:auto; }
    .grille2{ display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
    @media(max-width:620px){ .grille2{ grid-template-columns:1fr; } }
    .etapes{ display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1rem; font-size:0.8rem; color:var(--gris); }
    .etapes span{ background:#fff; border-radius:20px; padding:0.25rem 0.7rem; box-shadow:var(--ombre); }
  </style>
</head>
<body>
  <div id="nav-mount"></div>
  <main id="contenu"><p style="color:var(--gris)">Chargement…</p></main>
  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
  <script>
    let PROFIL = null;
    let DERNIER = null;   // dernier courrier généré { type, objet, email }
    (async function(){
      await initPage("outils");
      const contenu = document.getElementById("contenu");
      PROFIL = await monProfil();
      const v = verrouAcces(PROFIL);
      if (v){ contenu.innerHTML = v; return; }

      contenu.innerHTML = `
        <h2 class="section-titre">Outils pour les membres</h2>
        <p style="color:var(--gris);margin-bottom:1rem">Modèles à imprimer&nbsp;:
          <a href="attestation-nuisance.html">Attestation de constat</a> ·
          <a href="petition.html">Exemple de pétition</a> ·
          <a href="formulaire-adhesion.html">Formulaire d'adhésion</a></p>
        <div class="onglets">
          <button class="actif" data-p="courrier">Générateur de courrier</button>
          <button data-p="journal">Journal de bruit</button>
          <button data-p="demarches">Mes démarches</button>
        </div>

        <section class="panneau actif" id="p-courrier">
          <div class="etapes">
            <span>1. Amiable</span><span>2. Mise en demeure</span><span>3. Maire</span>
            <span>4. Gendarmerie</span><span>5. Procureur</span><span>6. Bailleur</span>
          </div>
          <div class="form-wrap" style="max-width:100%;margin:0 0 1.4rem">
            <p class="intro">Renseignez votre situation : le courrier est rédigé automatiquement, structuré et appuyé sur la réglementation applicable en Polynésie française. Relisez-le, complétez les éléments entre crochets, puis téléchargez ou copiez-le.</p>

            <div class="champ"><label>Où en êtes-vous ? <span style="font-weight:400;color:var(--gris)">— nous choisissons le bon courrier pour vous</span></label>
              <select id="c-situation">
                <option value="">— Décrivez votre situation (optionnel) —</option>
                <option value="amiable">Je n'ai encore rien entrepris</option>
                <option value="miseendemeure">J'ai déjà fait une démarche amiable, sans effet</option>
                <option value="mairie">La mise en demeure est restée sans effet</option>
                <option value="gendarmerie">Le bruit continue, surtout la nuit (tapage)</option>
                <option value="procureur">Rien n'a abouti : je veux porter plainte</option>
                <option value="bailleur">L'auteur du bruit est locataire / en copropriété</option>
              </select></div>

            <div class="champ"><label>Type de courrier (étape de la démarche)</label>
              <select id="c-type">
                <option value="amiable">1. Courrier amiable (au voisin / au responsable)</option>
                <option value="miseendemeure">2. Mise en demeure (recommandé avec A.R.)</option>
                <option value="mairie">3. Demande d'intervention au Maire (pouvoir de police)</option>
                <option value="gendarmerie">4. Signalement à la gendarmerie / police</option>
                <option value="procureur">5. Plainte au Procureur de la République</option>
                <option value="bailleur">6. Au propriétaire / bailleur / syndic</option>
              </select>
              <p id="c-aide" style="font-size:0.82rem;color:var(--gris);margin-top:0.3rem"></p></div>

            <div class="grille2">
              <div class="champ"><label>Vos nom et prénom</label><input id="c-exp-nom"></div>
              <div class="champ"><label>Votre adresse</label><input id="c-exp-adr"></div>
            </div>
            <div class="grille2">
              <div class="champ"><label>Votre e-mail (facultatif)</label><input id="c-exp-mail"></div>
              <div class="champ"><label>Votre téléphone (facultatif)</label><input id="c-exp-tel"></div>
            </div>

            <div class="champ"><label id="c-dest-lbl">Destinataire (nom et adresse)</label>
              <textarea id="c-dest" rows="2" placeholder="Nom et adresse du destinataire"></textarea>
              <input id="c-dest-mail" type="email" placeholder="E-mail du destinataire (facultatif — pour l'envoi direct)" style="margin-top:0.5rem"></div>

            <div class="grille2">
              <div class="champ"><label>Nature du bruit</label><select id="c-bruit"></select></div>
              <div class="champ"><label>Précision sur la source</label>
                <input id="c-source" placeholder="Ex. bar « … », voisin du dessus, chantier…"></div>
            </div>
            <div class="grille2">
              <div class="champ"><label>Horaires / fréquence</label>
                <input id="c-horaire" placeholder="Ex. tous les soirs après 22h, week-ends…"></div>
              <div class="champ"><label>Depuis quand</label><input type="month" id="c-depuis"></div>
            </div>
            <div class="champ"><label>Dates et heures précises constatées <span style="font-weight:400;color:var(--gris)">— renforce le dossier</span></label>
              <textarea id="c-faits" rows="2" placeholder="Ex. 12/05 23h15–1h ; 18/05 22h40–0h30 ; 25/05 …"></textarea></div>
            <div class="champ"><label>Démarches déjà entreprises (facultatif)</label>
              <textarea id="c-demarches" rows="2" placeholder="Ex. discussion le 03/05 ; courrier amiable le 10/05 ; appel police municipale…"></textarea></div>
            <div class="champ" style="display:flex;align-items:center;gap:0.5rem">
              <input type="checkbox" id="c-temoins" style="width:auto">
              <label for="c-temoins" style="margin:0">Des témoins / voisins peuvent attester des faits</label></div>

            <button class="btn btn-primaire" onclick="genererCourrier()">Générer le courrier</button>
            <button class="btn btn-vert" onclick="telechargerPDF()">Télécharger (PDF)</button>
            <button class="btn btn-vert" onclick="envoyerParEmail()">Envoyer par e-mail</button>
            <button class="btn btn-clair" onclick="telechargerLettre()">Télécharger (.txt)</button>
            <button class="btn btn-clair" onclick="copierLettre(this)">Copier le texte</button>
          </div>
          <pre class="lettre" id="apercu">Le courrier généré s'affichera ici.</pre>
          <p style="font-size:0.82rem;color:var(--gris);margin-top:0.8rem">
            Modèles indicatifs à relire et à adapter à votre situation ; ils ne constituent pas un conseil juridique. En cas de difficulté, rapprochez-vous du <a href="contact.html">bureau de l'association</a>.
            Pensez à joindre votre <a href="#" onclick="document.querySelector('.onglets button[data-p=journal]').click();return false;">journal de bruit</a> et, si possible, une <a href="attestation-nuisance.html">attestation de témoin</a>.
          </p>
        </section>

        <section class="panneau" id="p-journal">
          <div class="form-wrap" style="max-width:100%;margin:0 0 1rem">
            <p class="intro">Consignez chaque épisode de bruit : ce journal constitue une preuve précieuse pour vos démarches.</p>
            <div id="jmsg" class="message"></div>
            <form id="form-jb" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.7rem;align-items:end">
              <div class="champ" style="margin:0"><label>Date</label><input type="date" id="j-date" required></div>
              <div class="champ" style="margin:0"><label>Heure</label><input type="time" id="j-heure"></div>
              <div class="champ" style="margin:0"><label>Durée (min)</label><input type="number" id="j-duree" min="0"></div>
              <div class="champ" style="margin:0"><label>Intensité</label>
                <select id="j-intensite"><option>Faible</option><option>Moyenne</option><option selected>Forte</option><option>Insupportable</option></select></div>
              <div class="champ" style="margin:0;grid-column:1/-1"><label>Note</label><input id="j-note" placeholder="Ex. musique, fête voisin…"></div>
              <button class="btn btn-vert" type="submit" style="grid-column:1/-1">Ajouter l'épisode</button>
            </form>
          </div>
          <button class="btn btn-clair" onclick="exportJournal()">Exporter le journal (CSV)</button>
          <div id="liste-jb"></div>
        </section>

        <section class="panneau" id="p-demarches">
          <div class="form-wrap" style="max-width:100%;margin:0 0 1rem">
            <p class="intro">Consignez chaque démarche entreprise (courrier, visite, appel…) : vous gardez le fil de votre dossier et le <strong>bureau de Te Ora Hau en est informé</strong> pour pouvoir vous appuyer. Quand vous générez un courrier, on vous propose de l'enregistrer ici automatiquement.</p>
            <div id="dmsg" class="message"></div>
            <form id="form-dem" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:0.7rem;align-items:end">
              <div class="champ" style="margin:0"><label>Démarche</label>
                <select id="d-type">
                  <option>Courrier amiable</option><option>Mise en demeure</option>
                  <option>Demande au Maire</option><option>Signalement gendarmerie/police</option>
                  <option>Plainte au Procureur</option><option>Courrier bailleur/syndic</option>
                  <option>Appel téléphonique</option><option>Rencontre / visite</option><option>Autre</option>
                </select></div>
              <div class="champ" style="margin:0"><label>Date</label><input type="date" id="d-date" required></div>
              <div class="champ" style="margin:0"><label>Mode</label>
                <select id="d-mode"><option>Courrier simple</option><option>Recommandé A.R.</option><option>E-mail</option><option>Dépôt en main propre</option><option>Téléphone</option><option>Sur place</option></select></div>
              <div class="champ" style="margin:0"><label>Destinataire</label><input id="d-dest" placeholder="Ex. M. X, Mairie de Punaauia…"></div>
              <div class="champ" style="margin:0;grid-column:1/-1"><label>Note (facultatif)</label><input id="d-note" placeholder="Ex. réponse promise sous 8 jours…"></div>
              <div style="grid-column:1/-1;display:flex;gap:0.5rem;flex-wrap:wrap">
                <button class="btn btn-vert" type="submit" id="d-submit">Ajouter la démarche</button>
                <button class="btn btn-clair" type="button" id="d-annuler" onclick="annulerEditDem()" style="display:none">Annuler la modification</button>
              </div>
            </form>
          </div>
          <div id="suggestion-dem"></div>
          <div id="liste-dem"></div>
        </section>`;

      // Onglets
      document.querySelectorAll(".onglets button").forEach(b => b.addEventListener("click", () => {
        document.querySelectorAll(".onglets button").forEach(x=>x.classList.remove("actif"));
        document.querySelectorAll(".panneau").forEach(x=>x.classList.remove("actif"));
        b.classList.add("actif");
        document.getElementById("p-"+b.dataset.p).classList.add("actif");
      }));

      preparerCourrier();

      document.getElementById("j-date").value = aujLoc();
      document.getElementById("form-jb").addEventListener("submit", ajouterEpisode);
      await chargerJournal();

      document.getElementById("d-date").value = aujLoc();
      document.getElementById("form-dem").addEventListener("submit", ajouterDemarche);
      await chargerDemarches();
      prefillDemarches();
      // Lien direct vers un onglet (ex. depuis Mon espace ou après un signalement).
      let onglet = location.hash === "#demarches" ? "demarches" : "";
      try {
        const o = localStorage.getItem("TOH_onglet_outils");
        if (o) { onglet = o; localStorage.removeItem("TOH_onglet_outils"); }
      } catch(_){}
      if (onglet) {
        const b = document.querySelector('.onglets button[data-p="' + onglet + '"]');
        if (b) b.click();
      }
    })();

    /* ----- Générateur de courrier ----- */
    const INFOS_COURRIER = {
      amiable: {
        aide: "Première étape, en courrier simple : privilégie une résolution à l'amiable et trace votre bonne foi.",
        lbl: "Destinataire (le voisin ou le responsable du bruit)", dest: "" },
      miseendemeure: {
        aide: "Après l'étape amiable. À envoyer en recommandé avec accusé de réception — conservez la preuve de dépôt.",
        lbl: "Destinataire (le voisin ou le responsable du bruit)", dest: "" },
      mairie: {
        aide: "Le maire détient le pouvoir de police de la tranquillité publique ; la police municipale peut dresser procès-verbal.",
        lbl: "Destinataire (la mairie de votre commune)",
        dest: "Madame le Maire / Monsieur le Maire\nMairie de [commune]\n[adresse de la mairie]" },
      gendarmerie: {
        aide: "Pour faire constater les faits sur le moment, notamment le tapage nocturne (après 22 h).",
        lbl: "Destinataire (brigade de gendarmerie / poste de police)",
        dest: "Brigade de gendarmerie de [commune]\n[adresse]" },
      procureur: {
        aide: "Plainte écrite, à adresser au Procureur de la République près le tribunal de première instance de Papeete.",
        lbl: "Destinataire (Procureur de la République)",
        dest: "Monsieur le Procureur de la République\nTribunal de première instance de Papeete\n[adresse à compléter]" },
      bailleur: {
        aide: "Si l'auteur du bruit est locataire ou en copropriété : demandez au propriétaire, bailleur ou syndic d'agir.",
        lbl: "Destinataire (propriétaire / bailleur / syndic)", dest: "" }
    };

    function preparerCourrier(){
      const exp = document.getElementById("c-exp-nom");
      if (!exp || !PROFIL) return;
      exp.value = nomComplet(PROFIL);
      document.getElementById("c-exp-adr").value = [PROFIL.adresse, PROFIL.commune].filter(Boolean).join(", ");
      if (PROFIL.email) document.getElementById("c-exp-mail").value = PROFIL.email;
      if (PROFIL.telephone) document.getElementById("c-exp-tel").value = PROFIL.telephone;
      document.getElementById("c-bruit").innerHTML = optionsListe(SIG_TYPES, PROFIL.type_nuisance || "");
      const dest = document.getElementById("c-dest");
      dest.addEventListener("input", () => { dest.dataset.auto = ""; });
      document.getElementById("c-type").addEventListener("change", majTypeCourrier);
      // Le guide "Où en êtes-vous ?" sélectionne le bon courrier.
      const sit = document.getElementById("c-situation");
      if (sit) sit.addEventListener("change", () => {
        if (!sit.value) return;
        document.getElementById("c-type").value = sit.value;
        majTypeCourrier();
      });
      majTypeCourrier();

      // Pré-remplissage depuis un signalement récent (bouton « Rédiger un courrier »).
      try {
        const raw = localStorage.getItem("TOH_signalement");
        if (raw) {
          const s = JSON.parse(raw);
          if (s.type) document.getElementById("c-bruit").value = s.type;
          const src = s.adresse_source || s.quartier || "";
          if (src) document.getElementById("c-source").value = src;
          const horaire = [s.recurrence, s.horaire].filter(Boolean).join(", ");
          if (horaire) document.getElementById("c-horaire").value = horaire;
          if (s.debut) document.getElementById("c-depuis").value = s.debut;
          if (s.description) document.getElementById("c-faits").value = s.description;
          localStorage.removeItem("TOH_signalement");
          const aide = document.getElementById("c-aide");
          if (aide) aide.insertAdjacentHTML("afterend",
            `<p id="c-prefill" style="font-size:0.82rem;color:var(--vert-paix);margin-top:0.2rem">Pré-rempli à partir de votre signalement — vérifiez et complétez.</p>`);
        }
      } catch (_) {}
    }

    function majTypeCourrier(){
      const o = INFOS_COURRIER[document.getElementById("c-type").value];
      document.getElementById("c-aide").textContent = o.aide;
      document.getElementById("c-dest-lbl").textContent = o.lbl;
      const d = document.getElementById("c-dest");
      if (!d.value.trim() || d.dataset.auto === "1"){
        d.value = o.dest;
        d.dataset.auto = o.dest ? "1" : "";
      }
    }

    function genererCourrier(){
      const v = id => (document.getElementById(id).value || "").trim();
      const type = document.getElementById("c-type").value;
      const nom = v("c-exp-nom") || "[Vos nom et prénom]";
      const adr = v("c-exp-adr");
      const mail = v("c-exp-mail");
      const tel = v("c-exp-tel");
      const dest = v("c-dest") || "[Destinataire — nom et adresse]";
      const bruit = document.getElementById("c-bruit").value || "";
      const source = v("c-source") || "[préciser la source du bruit]";
      const horaire = v("c-horaire") || "[horaires / fréquence]";
      const depuis = v("c-depuis");
      const faits = v("c-faits");
      const demarches = v("c-demarches");
      const temoins = document.getElementById("c-temoins").checked;

      const dateLong = new Date().toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" });
      const ville = ((PROFIL && PROFIL.commune) || "").trim();
      const lieuDate = (ville ? ville + ", " : "") + "le " + dateLong;
      const expBloc = [nom, adr, mail, tel].filter(Boolean).join("\n");
      const recommande = (type === "miseendemeure") ? "Lettre recommandée avec accusé de réception\n\n" : "";
      const nuit = /nuit|22|23|minuit|soir/i.test(horaire);

      const faitsPhrase = `nuisances sonores${bruit ? " (" + bruit + ")" : ""} provenant de ${source}, survenant ${horaire}${depuis ? `, depuis ${moisAnnee(depuis)}` : ""}`;
      const blocFaits = faits ? `\n\nFaits constatés (dates et horaires) :\n${faits}` : "";
      const blocDem = demarches ? `\n\nDémarches déjà entreprises :\n${demarches}` : "";
      const tem = temoins ? " Plusieurs voisins, témoins de ces faits, peuvent en attester." : "";
      const PJ = "\n\nPièces jointes :\n- Journal de bruit (relevé daté des épisodes)\n- Attestations de témoins, le cas échéant\n- Tout élément utile (courriers, photos, enregistrements)";

      let objet, salut, corps, politesse, pj = "";

      if (type === "amiable"){
        objet = "Trouble de voisinage lié à des nuisances sonores — démarche amiable";
        salut = "Madame, Monsieur,";
        corps = `Je me permets de vous écrire au sujet des ${faitsPhrase}.\n\n`+
          `Ces bruits, par leur intensité, leur durée et leur répétition, perturbent ma tranquillité${nuit ? " et mon sommeil" : ""}. Je suis toutefois convaincu(e) qu'il s'agit d'une gêne involontaire.\n\n`+
          `Je vous remercie par avance de bien vouloir prendre les mesures nécessaires pour y remédier, afin que chacun puisse vivre en bon voisinage. Je reste à votre entière disposition pour en échanger et trouver ensemble une solution amiable.${tem}`;
        politesse = "Je vous prie d'agréer, Madame, Monsieur, l'expression de mes salutations distinguées.";
      } else if (type === "miseendemeure"){
        objet = "Mise en demeure de faire cesser des nuisances sonores";
        salut = "Madame, Monsieur,";
        corps = `Malgré mes démarches amiables restées sans effet, ces ${faitsPhrase} persistent.${blocFaits}${blocDem}\n\n`+
          `Ces troubles excèdent les inconvénients normaux du voisinage et sont de nature à engager votre responsabilité au titre des troubles anormaux de voisinage. Lorsqu'ils surviennent la nuit, ils sont susceptibles de constituer un tapage nocturne, réprimé par l'article R. 623-2 du code pénal. Ils contreviennent en outre à la réglementation applicable en Polynésie française en matière de bruit (Code de l'environnement de la Polynésie française — lutte contre le bruit et gestion des émissions sonores).\n\n`+
          `Par la présente, je vous mets en demeure de faire cesser définitivement ces nuisances dans un délai de huit (8) jours à compter de la réception du présent courrier.\n\n`+
          `À défaut, je me réserve le droit de saisir les autorités compétentes (police municipale, gendarmerie, Procureur de la République) et d'engager toute action utile, y compris en réparation du préjudice subi.${tem}`;
        politesse = "Dans l'attente de votre diligence, je vous prie d'agréer, Madame, Monsieur, l'expression de mes salutations distinguées.";
        pj = PJ;
      } else if (type === "mairie"){
        objet = "Demande d'intervention contre des nuisances sonores";
        salut = "Madame le Maire, Monsieur le Maire,";
        corps = `En votre qualité d'autorité chargée du bon ordre et de la tranquillité publique dans la commune, je sollicite votre intervention au sujet des ${faitsPhrase}.${blocFaits}${blocDem}\n\n`+
          `Ces troubles répétés portent atteinte à la tranquillité publique. Je vous remercie de bien vouloir faire constater ces faits par la police municipale — habilitée à dresser procès-verbal des infractions aux arrêtés municipaux, notamment ceux interdisant les bruits gênants — et de faire appliquer la réglementation sur le bruit (Code de l'environnement de la Polynésie française).${tem}\n\n`+
          `Je me tiens à votre disposition pour tout complément d'information et pour témoigner des faits.`;
        politesse = "Je vous prie d'agréer, Madame le Maire, Monsieur le Maire, l'expression de ma haute considération.";
        pj = PJ;
      } else if (type === "gendarmerie"){
        objet = "Signalement de nuisances sonores — demande de constatation";
        salut = "Madame, Monsieur,";
        corps = `Je souhaite porter à votre connaissance des ${faitsPhrase}.${blocFaits}${blocDem}\n\n`+
          `Ces faits, en particulier lorsqu'ils surviennent après 22 heures, sont susceptibles de constituer un tapage nocturne réprimé par l'article R. 623-2 du code pénal. Je sollicite votre intervention afin de les faire constater.${tem}\n\n`+
          `Je me tiens à votre disposition pour vous communiquer tout élément complémentaire.`;
        politesse = "Je vous prie d'agréer, Madame, Monsieur, l'expression de mes salutations distinguées.";
        pj = PJ;
      } else if (type === "procureur"){
        objet = "Plainte pour nuisances sonores";
        salut = "Monsieur le Procureur de la République,";
        corps = `J'ai l'honneur de porter plainte contre la personne responsable des faits décrits ci-après (ou, si l'auteur est identifié : M./Mme …).\n\n`+
          `Les faits : je subis des ${faitsPhrase}.${blocFaits}${blocDem}\n\n`+
          `Ces faits sont susceptibles de constituer un tapage nocturne réprimé par l'article R. 623-2 du code pénal, ainsi qu'une atteinte à la réglementation sur le bruit applicable en Polynésie française (Code de l'environnement de la Polynésie française).${tem}\n\n`+
          `Je vous prie de bien vouloir engager les poursuites que vous jugerez utiles. Je me réserve la possibilité de me constituer partie civile.`;
        politesse = "Je vous prie d'agréer, Monsieur le Procureur de la République, l'expression de ma haute considération.";
        pj = PJ;
      } else { // bailleur
        objet = "Nuisances sonores causées par un occupant — demande d'action";
        salut = "Madame, Monsieur,";
        corps = `Je me permets de vous solliciter en votre qualité de propriétaire, bailleur ou syndic, au sujet des ${faitsPhrase}, dont l'auteur occupe un logement relevant de votre gestion.${blocFaits}${blocDem}\n\n`+
          `Le contrat de bail comme le règlement de copropriété imposent à chaque occupant de ne pas troubler la tranquillité du voisinage. Je vous remercie de bien vouloir intervenir auprès de l'occupant concerné afin de faire cesser ces nuisances, et de me tenir informé(e) des suites données.${tem}`;
        politesse = "Je vous prie d'agréer, Madame, Monsieur, l'expression de mes salutations distinguées.";
        pj = PJ;
      }

      const lettre =
        `${expBloc}\n\n\n${dest}\n\n\n${lieuDate}\n\n${recommande}Objet : ${objet}\n\n${salut}\n\n${corps}\n\n${politesse}\n\n\n${nom}${pj}`;
      // Version e-mail (sans les blocs postaux) + infos pour le suivi.
      DERNIER = {
        type, objet,
        email: `${salut}\n\n${corps}\n\n${politesse}\n\n${nom}` +
               (adr ? `\n${adr}` : "") + (tel ? `\nTél. : ${tel}` : "") + pj,
      };
      const ap = document.getElementById("apercu");
      ap.textContent = lettre;
      ap.scrollIntoView({ behavior:"smooth", block:"nearest" });
    }

    function lettreActuelle(){
      let t = document.getElementById("apercu").textContent;
      if (!t || t.startsWith("Le courrier généré")) { genererCourrier(); t = document.getElementById("apercu").textContent; }
      return t;
    }

    function telechargerLettre(){
      const blob = new Blob([lettreActuelle()], { type:"text/plain;charset=utf-8" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = "courrier-nuisances.txt"; a.click();
      proposerSuivi("Courrier simple");
    }

    // Envoi par e-mail : ouvre la messagerie avec objet + corps prêts à partir.
    function envoyerParEmail(){
      lettreActuelle();                       // garantit que DERNIER est à jour
      if (!DERNIER) return;
      const destMail = (document.getElementById("c-dest-mail").value || "").trim();
      location.href = `mailto:${encodeURIComponent(destMail)}` +
        `?subject=${encodeURIComponent(DERNIER.objet)}&body=${encodeURIComponent(DERNIER.email)}`;
      setTimeout(() => proposerSuivi("E-mail"), 800);
    }

    function telechargerPDF(){
      const t = lettreActuelle();
      if (!window.html2pdf){ telechargerLettre(); return; }   // repli si la librairie n'a pas chargé
      const page = document.createElement("div");
      page.style.cssText = "position:fixed;left:-9999px;top:0;width:210mm;box-sizing:border-box;"+
        "padding:22mm 20mm;background:#fff;color:#111;font-family:Georgia,'Times New Roman',serif;"+
        "font-size:11.5pt;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;";
      page.textContent = t;
      document.body.appendChild(page);
      html2pdf().set({
        margin: 0,
        filename: "courrier-nuisances.pdf",
        image: { type:"jpeg", quality:0.98 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:"#ffffff" },
        jsPDF: { unit:"mm", format:"a4", orientation:"portrait" },
        pagebreak: { mode:["css","legacy"] }
      }).from(page).save()
        .then(() => { page.remove(); proposerSuivi("Courrier (PDF)"); })
        .catch(() => page.remove());
    }

    function copierLettre(btn){
      let t = document.getElementById("apercu").textContent;
      if (!t || t.startsWith("Le courrier généré")) { genererCourrier(); t = document.getElementById("apercu").textContent; }
      navigator.clipboard.writeText(t).then(()=>{
        const lbl = btn.textContent; btn.textContent = "Copié ✓";
        setTimeout(()=>btn.textContent = lbl, 1500);
      }).catch(()=>{});
    }

    /* ----- Journal de bruit (Supabase) ----- */
    async function ajouterEpisode(e){
      e.preventDefault();
      const s = await sessionActive();
      const row = {
        auteur: s.user.id,
        date_episode: document.getElementById("j-date").value,
        heure: document.getElementById("j-heure").value,
        duree_min: parseInt(document.getElementById("j-duree").value)||null,
        intensite: document.getElementById("j-intensite").value,
        note: document.getElementById("j-note").value.trim(),
      };
      const { error } = await sb.from("journal_bruit").insert(row);
      const m = document.getElementById("jmsg");
      m.className = "message " + (error?"err":"ok");
      m.textContent = error ? "Erreur : "+error.message : "Épisode ajouté ✔";
      document.getElementById("j-note").value = "";
      await chargerJournal();
    }
    let JB = [];
    async function chargerJournal(){
      const { data } = await sb.from("journal_bruit").select("*").order("date_episode",{ascending:false});
      JB = data || [];
      const lignes = JB.map(j => `<tr>
        <td>${j.date_episode||''}</td><td>${j.heure||''}</td><td>${j.duree_min!=null?j.duree_min+' min':''}</td>
        <td>${echapper(j.intensite)||''}</td><td>${echapper(j.note)||''}</td></tr>`).join("");
      document.getElementById("liste-jb").innerHTML = JB.length ? `
        <table class="jb"><thead><tr><th>Date</th><th>Heure</th><th>Durée</th><th>Intensité</th><th>Note</th></tr></thead>
        <tbody>${lignes}</tbody></table>` : "<p style='color:var(--gris);margin-top:1rem'>Aucun épisode enregistré.</p>";
    }
    function exportJournal(){
      const en = ["Date","Heure","Duree_min","Intensite","Note"];
      const l = JB.map(j => [j.date_episode,j.heure,j.duree_min,j.intensite,j.note]
        .map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(","));
      const blob = new Blob([en.join(",")+"\n"+l.join("\n")], { type:"text/csv;charset=utf-8" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = "journal-de-bruit.csv"; a.click();
    }

    /* ----- Suivi des démarches (visible par le bureau) ----- */
    const TYPE_LABELS = { amiable:"Courrier amiable", miseendemeure:"Mise en demeure", mairie:"Demande au Maire",
                          gendarmerie:"Signalement gendarmerie/police", procureur:"Plainte au Procureur", bailleur:"Courrier bailleur/syndic" };
    const ORDRE_ETAPES = ["Courrier amiable","Mise en demeure","Demande au Maire","Signalement gendarmerie/police","Plainte au Procureur"];
    const CLE_TYPE = { "Courrier amiable":"amiable", "Mise en demeure":"miseendemeure", "Demande au Maire":"mairie",
                       "Signalement gendarmerie/police":"gendarmerie", "Plainte au Procureur":"procureur", "Courrier bailleur/syndic":"bailleur" };
    let DEM = [], EDIT_DEM = null;
    // Dates « AAAA-MM-JJ » manipulées en texte (aucun fuseau, aucun décalage).
    function frDateLoc(iso){ const p = String(iso||"").slice(0,10).split("-"); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : ""; }
    function aujLoc(){ const t = new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`; }

    // Après chaque génération/envoi : propose d'enregistrer la démarche.
    async function proposerSuivi(mode){
      if (!DERNIER) return;
      if (!confirm("Enregistrer cette démarche dans votre suivi ?\n\nVous gardez le fil de votre dossier, et le bureau de Te Ora Hau en est informé pour pouvoir vous appuyer.")) return;
      const s = await sessionActive();
      const dest = (document.getElementById("c-dest").value || "").split("\n")[0].trim();
      const { error } = await sb.from("demarches").insert({
        auteur: s.user.id,
        type: TYPE_LABELS[DERNIER.type] || DERNIER.type,
        date_demarche: aujLoc(),
        mode, destinataire: dest, note: DERNIER.objet,
      });
      if (error) alert("Suivi non enregistré : " + error.message + "\n(Le bureau doit lancer migration-demarches.sql.)");
      else { await chargerDemarches(); alert("Démarche enregistrée dans votre suivi ✔ (onglet « Mes démarches »)"); }
    }

    async function ajouterDemarche(e){
      e.preventDefault();
      const s = await sessionActive();
      const champs = {
        type: document.getElementById("d-type").value,
        date_demarche: document.getElementById("d-date").value || null,
        mode: document.getElementById("d-mode").value,
        destinataire: document.getElementById("d-dest").value.trim(),
        note: document.getElementById("d-note").value.trim(),
      };
      let error;
      if (EDIT_DEM){
        ({ error } = await sb.from("demarches").update(champs).eq("id", EDIT_DEM));
      } else {
        ({ error } = await sb.from("demarches").insert(Object.assign({ auteur: s.user.id }, champs)));
      }
      const m = document.getElementById("dmsg");
      m.className = "message " + (error ? "err" : "ok");
      m.textContent = error ? "Erreur : " + error.message + " (migration-demarches.sql non lancée ?)"
        : (EDIT_DEM ? "Démarche corrigée ✔" : "Démarche enregistrée ✔");
      if (!error){ annulerEditDem(); document.getElementById("d-dest").value = ""; document.getElementById("d-note").value = ""; }
      await chargerDemarches();
    }
    // Charge une démarche dans le formulaire pour la corriger.
    function editerDemarche(id){
      const d = DEM.find(x => x.id === id); if (!d) return;
      document.getElementById("d-type").value = d.type || "";
      document.getElementById("d-date").value = (d.date_demarche || "").slice(0,10);
      document.getElementById("d-mode").value = d.mode || "Courrier simple";
      document.getElementById("d-dest").value = d.destinataire || "";
      document.getElementById("d-note").value = d.note || "";
      EDIT_DEM = id;
      document.getElementById("d-submit").textContent = "Enregistrer les modifications";
      document.getElementById("d-annuler").style.display = "";
      document.getElementById("form-dem").scrollIntoView({ behavior:"smooth", block:"center" });
    }
    function annulerEditDem(){
      EDIT_DEM = null;
      document.getElementById("d-submit").textContent = "Ajouter la démarche";
      document.getElementById("d-annuler").style.display = "none";
      document.getElementById("d-dest").value = ""; document.getElementById("d-note").value = "";
    }

    async function chargerDemarches(){
      const box = document.getElementById("liste-dem");
      if (!box) return;
      const { data, error } = await sb.from("demarches").select("*")
        .order("date_demarche", { ascending:false }).order("cree_le", { ascending:false });
      if (error){ box.innerHTML = ""; document.getElementById("suggestion-dem").innerHTML = ""; return; }
      DEM = data || [];
      const SUITES = ["En attente","Réponse reçue","Sans réponse","Résolu"];
      box.innerHTML = DEM.length ? `
        <table class="jb"><thead><tr><th>Date</th><th>Démarche</th><th>Destinataire</th><th>Mode</th><th>Suite donnée</th><th></th></tr></thead><tbody>` +
        DEM.map(d => `<tr>
          <td>${frDateLoc(d.date_demarche)}</td>
          <td><strong>${echapper(d.type)}</strong>${d.note ? `<br><span style="color:var(--gris);font-size:0.8rem">${echapper(d.note)}</span>` : ''}</td>
          <td>${echapper(d.destinataire)||'—'}</td><td>${echapper(d.mode)||'—'}</td>
          <td><select onchange="majSuite('${d.id}', this.value)" style="padding:0.3rem 0.4rem;border:1.5px solid #d6d6cf;border-radius:7px;font-size:0.85rem">${
            SUITES.map(o => `<option${(d.reponse||'En attente')===o?' selected':''}>${o}</option>`).join("")
          }</select></td>
          <td style="white-space:nowrap">
            <button class="btn btn-clair" style="padding:0.25rem 0.55rem;font-size:0.8rem" onclick="editerDemarche('${d.id}')" title="Corriger">✎</button>
            <button class="btn btn-clair" style="padding:0.25rem 0.55rem;font-size:0.8rem" onclick="supprimerDemarche('${d.id}')" title="Supprimer">✕</button></td>
        </tr>`).join("") + `</tbody></table>`
        : "<p style='color:var(--gris);margin-top:1rem'>Aucune démarche enregistrée. Ajoutez votre première démarche ci-dessus — ou générez un courrier : on vous proposera de l'enregistrer ici.</p>";
      rendreSuggestion();
    }

    // Étape suivante conseillée selon le parcours déjà accompli.
    function rendreSuggestion(){
      const el = document.getElementById("suggestion-dem");
      if (!el) return;
      if (DEM.some(d => d.reponse === "Résolu")){
        el.innerHTML = `<div class="message ok" style="display:block;margin:0 0 1rem">Une démarche est marquée <strong>Résolu</strong> — bravo ! Pensez à en informer le <a href="contact.html">bureau</a>.</div>`;
        return;
      }
      const faites = DEM.map(d => d.type);
      let idx = -1;
      ORDRE_ETAPES.forEach((t, i) => { if (faites.includes(t)) idx = Math.max(idx, i); });
      const suivante = ORDRE_ETAPES[idx + 1];
      if (idx >= 0 && suivante){
        el.innerHTML = `<div class="message ok" style="display:block;margin:0 0 1rem">Étape suivante conseillée : <strong>${suivante}</strong> —
          <a href="#" onclick="preparerEtape('${CLE_TYPE[suivante]}');return false;" style="font-weight:700">préparer ce courrier →</a></div>`;
      } else if (idx === ORDRE_ETAPES.length - 1){
        el.innerHTML = `<div class="message ok" style="display:block;margin:0 0 1rem">Vous avez parcouru toutes les étapes : le <a href="contact.html">bureau</a> peut vous accompagner pour la suite.</div>`;
      } else { el.innerHTML = ""; }
    }
    function preparerEtape(cle){
      document.getElementById("c-type").value = cle;
      majTypeCourrier();
      const b = document.querySelector('.onglets button[data-p="courrier"]');
      if (b) b.click();
      document.getElementById("c-type").scrollIntoView({ behavior:"smooth", block:"center" });
    }
    async function majSuite(id, val){
      const { error } = await sb.from("demarches").update({ reponse: val }).eq("id", id);
      if (error) alert("Erreur : " + error.message);
      const d = DEM.find(x => x.id === id); if (d) d.reponse = val;
      rendreSuggestion();
    }
    async function supprimerDemarche(id){
      if (!confirm("Supprimer cette démarche de votre suivi ?")) return;
      const { error } = await sb.from("demarches").delete().eq("id", id);
      if (error) return alert("Erreur : " + error.message);
      await chargerDemarches();
    }
    // Renseigne "Démarches déjà entreprises" du courrier à partir du suivi.
    function prefillDemarches(){
      const ta = document.getElementById("c-demarches");
      if (!ta || ta.value.trim() || !DEM.length) return;
      ta.value = DEM.slice().reverse().map(d =>
        `${d.type}${d.date_demarche ? ` le ${frDateLoc(d.date_demarche)}` : ''}` +
        `${d.reponse && d.reponse !== "En attente" ? ` (${d.reponse.toLowerCase()})` : ''}`).join(" ; ");
    }
  </script>
</body>
</html>
