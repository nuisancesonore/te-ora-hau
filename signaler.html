<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signaler une nuisance · Te Ora Hau</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>#map{ height:340px; border-radius:12px; box-shadow:var(--ombre); margin-bottom:0.4rem; cursor:crosshair; }
    .aide{ font-size:0.82rem; color:var(--gris); margin-bottom:1rem; }
    .rech-box{ display:flex; gap:0.4rem; margin-bottom:0.5rem; }
    .rech-box input{ flex:1; padding:0.55rem 0.7rem; border:1.5px solid #d6d6cf; border-radius:9px; font-size:0.95rem; }
    @media(max-width:760px){ .layout{ grid-template-columns:1fr !important; } }</style>
</head>
<body>
  <div id="nav-mount"></div>
  <main id="contenu"><p style="color:var(--gris)">Chargement…</p></main>
  <div id="footer-mount"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function(){
      await initPage("signaler");
      const contenu = document.getElementById("contenu");
      const profil = await monProfil();
      const v = verrouAcces(profil);
      if (v){ contenu.innerHTML = v; return; }

      contenu.innerHTML = `
        <h2 class="section-titre">Signaler une nuisance sonore</h2>
        <p class="aide"><strong>Placez un point précis</strong> — la commune seule ne suffit pas (trop vaste). 3 façons&nbsp;: <strong>① recherchez une adresse</strong>, <strong>② cliquez directement sur la carte</strong>, ou <strong>③ utilisez votre position</strong> (idéal sur mobile). Votre signalement alimente la <a href="carte.html">carte collective</a>.</p>
        <div class="layout" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start">
          <div>
            <div class="rech-box">
              <input id="recherche" placeholder="Rechercher une adresse, un quartier, un lieu…">
              <button class="btn btn-clair" id="btn-rech" type="button" style="padding:0.55rem 0.9rem">🔍 Chercher</button>
            </div>
            <div id="map"></div>
            <button class="btn btn-clair" id="geo" style="width:100%;margin-top:0.4rem">📍 Utiliser ma position actuelle (GPS)</button>
            <p class="aide" id="coord" style="font-weight:600">⚠️ Aucun point placé — recherchez, cliquez sur la carte, ou utilisez le GPS.</p>
          </div>
          <div class="form-wrap" style="max-width:100%;margin:0">
            <div id="msg" class="message"></div>
            <form id="form-sig">
              <div class="champ"><label>Type de nuisance</label>
                <select id="type" required>${optionsListe(SIG_TYPES, "", "— Choisir —")}</select></div>
              <p style="font-size:0.85rem;font-weight:600;color:var(--bleu-fonce);margin:0.2rem 0 0.4rem">Où se situe le bruit&nbsp;? <span style="font-weight:400;color:var(--gris)">(la source de la nuisance)</span></p>
              <div class="champ"><label>Commune <span style="font-weight:400;color:var(--gris)">— où se situe le bruit</span></label><select id="commune" required></select>
                <input id="commune_autre" placeholder="Précisez la commune" style="display:none;margin-top:0.5rem"></div>
              <div class="champ"><label>Quartier / localité <span style="font-weight:400;color:var(--gris)">— du bruit</span></label>
                <input id="quartier" list="liste-quartiers" placeholder="Ex. Taravao, Afaahiti, Puurai…" autocomplete="off">
                <datalist id="liste-quartiers"></datalist></div>
              <div class="champ"><label>Adresse de la source du bruit <span style="font-weight:400;color:var(--gris)">— se remplit au clic, modifiable</span></label>
                <input id="adresse_source" placeholder="Placez le point sur la carte pour la remplir"></div>
              <div class="champ"><label>Votre adresse <span style="font-weight:400;color:var(--gris)">— vous qui subissez · repris de votre profil (modifiable)</span></label>
                <input id="adresse_plaignant" placeholder="Votre adresse / quartier"></div>
              <div class="champ"><label>Horaire</label>
                <select id="horaire">${optionsListe(SIG_HORAIRES)}</select></div>
              <div class="champ"><label>Intensité ressentie</label>
                <select id="intensite">${optionsListe(SIG_INTENSITES, "Forte")}</select></div>
              <div class="champ"><label>Récurrence</label>
                <select id="recurrence">${optionsListe(SIG_RECURRENCES, "Régulier")}</select></div>
              <div class="champ"><label>Début des nuisances <span style="font-weight:400;color:var(--gris)">— mois et année</span></label>
                <input type="month" id="debut"></div>
              <div class="champ"><label>Constat / démarche</label>
                <select id="constat">
                  <option value="Signalement seul" selected>Signalement seul (sur la carte)</option>
                  <option value="Constat d'autorité">Constat d'une autorité officielle (police municipale)</option>
                  <option value="Constat + plainte">Constat d'autorité + plainte à la gendarmerie</option>
                </select>
                <p style="font-size:0.8rem;color:var(--gris);margin-top:0.3rem">Précisez si votre signalement est appuyé par un constat officiel et/ou une plainte — cela renforce le dossier.</p></div>
              <div class="champ"><label>Description</label>
                <textarea id="description" rows="3" placeholder="Décrivez la situation…"></textarea></div>
              <button type="submit" class="btn btn-primaire btn-bloc">Envoyer le signalement</button>
            </form>
          </div>
        </div>`;

      const selCommune = document.getElementById("commune");
      selCommune.innerHTML = optionsCommunes(profil.commune);
      const valCommune = brancherCommuneAutre(selCommune, document.getElementById("commune_autre"));

      // Pré-remplissage depuis le profil (modifiable) : votre adresse + type habituel.
      if (profil.adresse) document.getElementById("adresse_plaignant").value = profil.adresse;
      if (SIG_TYPES.includes(profil.type_nuisance || "")) document.getElementById("type").value = profil.type_nuisance;

      // Suggestions de quartier selon la commune choisie
      function majQuartiers(){
        const liste = (COMMUNES_DETAIL[selCommune.value] || []);
        document.getElementById("liste-quartiers").innerHTML =
          liste.map(q => `<option value="${q}">`).join("");
      }
      selCommune.addEventListener("change", majQuartiers);
      majQuartiers();

      // Carte centrée sur Tahiti
      const map = L.map("map").setView([-17.62, -149.46], 11);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { attribution:"© OpenStreetMap", maxZoom:19 }).addTo(map);
      let marqueur = null, pt = null;
      async function poser(lat, lng){
        pt = { lat, lng };
        if (marqueur) marqueur.setLatLng([lat,lng]); else marqueur = L.marker([lat,lng]).addTo(map);
        const c = document.getElementById("coord");
        c.style.color = "var(--vert-paix)";
        c.textContent = `✅ Point placé (${lat.toFixed(5)}, ${lng.toFixed(5)}). Recherche de l'adresse…`;
        const g = await reverseGeocode(lat, lng);
        if (g){
          if (g.adresse) document.getElementById("adresse_source").value = g.adresse;
          if (g.quartier) document.getElementById("quartier").value = g.quartier;
          {
            // Comparaison tolérante (apostrophes, accents, espaces) ; on teste
            // d'abord le quartier (souvent le district, ex. Papenoo) puis la commune.
            const norm = s => (s||"").toLowerCase().normalize("NFD")
              .replace(/[̀-ͯ]/g,"").replace(/['ʻ’`\s\-]/g,"");
            const cands = [g.quartier, g.commune].filter(Boolean).map(norm);
            let match = COMMUNES_PF.find(x => cands.includes(norm(x)));
            if (!match) match = COMMUNES_PF.find(x => cands.some(c => norm(x).includes(c) || c.includes(norm(x))));
            if (match){ selCommune.value = match; majQuartiers(); }
          }
          c.textContent = `✅ Point placé — commune, quartier et adresse remplis automatiquement (modifiables).`;
        } else {
          c.textContent = `✅ Point placé (${lat.toFixed(5)}, ${lng.toFixed(5)}). Renseignez l'adresse à la main.`;
        }
      }
      map.on("click", e => poser(e.latlng.lat, e.latlng.lng));
      document.getElementById("geo").addEventListener("click", () => {
        if (!navigator.geolocation){ alert("Géolocalisation non disponible sur cet appareil. Cliquez sur la carte."); return; }
        navigator.geolocation.getCurrentPosition(p => {
          poser(p.coords.latitude, p.coords.longitude);
          map.setView([p.coords.latitude, p.coords.longitude], 16);
        }, () => alert("Géolocalisation refusée ou indisponible. Recherchez une adresse ou cliquez sur la carte."));
      });

      // Recherche d'adresse / de lieu (géocodage OpenStreetMap), tolérante
      // aux graphies tahitiennes (apostrophes ' ʻ ’ `).
      async function chercherNominatim(url){
        try { const r = await fetch(url); const d = await r.json();
          if (d && d.length) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
        } catch(_) {}
        return null;
      }
      async function rechercher(){
        const q = document.getElementById("recherche").value.trim();
        if (!q) return;
        const sansApos = q.replace(/['ʻ’`]/g, "");      // PAPE'ETE -> PAPEETE
        const essais = [...new Set([q, sansApos])];
        let res = null;
        // 1) En Polynésie, saisie puis variante sans apostrophe
        for (const t of essais){
          res = await chercherNominatim("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=pf&q=" + encodeURIComponent(t));
          if (res) break;
        }
        // 2) Dernier essai : recherche élargie « <lieu>, Polynésie française »
        if (!res) res = await chercherNominatim("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(sansApos + ", Polynésie française"));
        if (res){
          poser(res.lat, res.lng); map.setView([res.lat, res.lng], 16);
        } else {
          alert("Lieu introuvable. Essayez un nom simple (ex. « Papeete », « Taravao »), sans apostrophe, ou cliquez directement sur la carte.");
        }
      }
      document.getElementById("btn-rech").addEventListener("click", rechercher);
      document.getElementById("recherche").addEventListener("keydown", e => {
        if (e.key === "Enter"){ e.preventDefault(); rechercher(); }
      });

      const msg = document.getElementById("msg");
      document.getElementById("form-sig").addEventListener("submit", async function(e){
        e.preventDefault();
        if (!pt){
          msg.className = "message err";
          msg.textContent = "Veuillez d'abord placer un point précis sur la carte (recherche d'adresse, clic, ou position GPS) — sinon le signalement n'apparaîtra pas sur la carte.";
          document.getElementById("map").scrollIntoView({ behavior:"smooth", block:"center" });
          return;
        }
        const s = await sessionActive();
        const row = {
          auteur: s.user.id,
          type: document.getElementById("type").value,
          commune: valCommune(),
          quartier: document.getElementById("quartier").value.trim(),
          adresse_source: document.getElementById("adresse_source").value.trim(),
          adresse_plaignant: document.getElementById("adresse_plaignant").value.trim(),
          horaire: document.getElementById("horaire").value,
          intensite: document.getElementById("intensite").value,
          recurrence: document.getElementById("recurrence").value,
          constat: document.getElementById("constat").value,
          debut: document.getElementById("debut").value || null,
          description: document.getElementById("description").value.trim(),
          lat: pt?pt.lat:null, lng: pt?pt.lng:null,
        };
        let { error } = await sb.from("signalements").insert(row);
        if (error && /column|schema cache|constat|debut/i.test(error.message)) {  // colonnes pas encore ajoutées
          delete row.constat; delete row.debut;
          ({ error } = await sb.from("signalements").insert(row));
        }
        if (error){ msg.className="message err"; msg.textContent="Erreur : "+error.message; return; }
        // Mémorise le signalement pour pré-remplir un courrier (outils.html).
        try { localStorage.setItem("TOH_signalement", JSON.stringify({
          type: row.type, commune: row.commune, quartier: row.quartier,
          adresse_source: row.adresse_source, horaire: row.horaire,
          recurrence: row.recurrence, debut: row.debut, description: row.description
        })); } catch(_){}
        msg.className="message ok";
        msg.innerHTML = `Merci&nbsp;! Votre signalement a été enregistré. Prochaine étape&nbsp;?
          <span style="display:inline-flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.7rem">
            <a href="outils.html" class="btn btn-vert">Rédiger un courrier</a>
            <a href="carte.html" class="btn btn-clair">Voir la carte</a>
          </span>`;
        msg.scrollIntoView({ behavior:"smooth", block:"center" });
      });
    })();
  </script>
</body>
</html>
